<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База ПЧ | Спільна робота</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ваша конфігурація Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const App = () => {
            const [vfds, setVfds] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [searchTerm, setSearchTerm] = React.useState("");

            React.useEffect(() => {
                const dbRef = ref(db, 'shared_vfd_list/');
                onValue(dbRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Перетворюємо об'єкт Firebase у масив
                        const list = Object.keys(data).map(key => ({
                            ...data[key],
                            firebaseId: key
                        }));
                        setVfds(list);
                    } else {
                        setVfds([]);
                    }
                    setLoading(false);
                });
            }, []);

            const addVfd = () => {
                const manufacturer = prompt("Введіть виробника (напр. Siemens):");
                if (!manufacturer) return;
                const series = prompt("Введіть серію (напр. G120):");
                const power = prompt("Введіть потужність (кВт):");

                const newVfd = {
                    numId: vfds.length + 1,
                    manufacturer,
                    series: series || "-",
                    power: power || "-",
                    status: "В наявності",
                    date: new Date().toLocaleString("uk-UA")
                };

                push(ref(db, 'shared_vfd_list/'), newVfd);
            };

            const filteredVfds = vfds.filter(v => 
                v.manufacturer.toLowerCase().includes(searchTerm.toLowerCase()) ||
                v.series.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (loading) return (
                <div className="flex flex-col h-screen items-center justify-center">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                    <p className="text-slate-500 font-medium">Підключення до спільної бази ПЧ...</p>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                🔌 Реєстр ПЧ <span className="text-xs bg-green-100 text-green-600 px-2 py-1 rounded-full uppercase tracking-wider">Online</span>
                            </h1>
                            <p className="text-slate-500 text-sm">Спільна база даних для команди</p>
                        </div>
                        <div className="flex gap-3 w-full md:w-auto">
                            <input 
                                type="text" 
                                placeholder="Пошук..." 
                                className="border border-slate-200 rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <button 
                                onClick={addVfd}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-all shadow-lg shadow-blue-200 whitespace-nowrap"
                            >
                                + Додати
                            </button>
                        </div>
                    </header>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">№</th>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">Виробник</th>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">Серія</th>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">Потужність</th>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">Статус</th>
                                    <th className="p-4 font-bold text-slate-600 text-sm uppercase">Дата додавання</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredVfds.length === 0 ? (
                                    <tr>
                                        <td colSpan="6" className="p-12 text-center">
                                            <div className="text-slate-300 mb-2">📦</div>
                                            <p className="text-slate-400">База порожня або нічого не знайдено</p>
                                        </td>
                                    </tr>
                                ) : (
                                    filteredVfds.map((v) => (
                                        <tr key={v.firebaseId} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 text-slate-400 font-mono text-sm">{v.numId}</td>
                                            <td className="p-4 font-bold text-slate-700">{v.manufacturer}</td>
                                            <td className="p-4 text-slate-600">{v.series}</td>
                                            <td className="p-4"><span className="bg-slate-100 px-2 py-1 rounded text-sm font-medium">{v.power} кВт</span></td>
                                            <td className="p-4">
                                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                    {v.status}
                                                </span>
                                            </td>
                                            <td className="p-4 text-slate-400 text-sm">{v.date}</td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                    
                    <footer className="mt-6 text-center text-slate-400 text-xs">
                        Дані синхронізуються автоматично через Firebase Realtime Database
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
