<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub | Service & Registry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('hub'); 
            const [activeTab, setActiveTab] = React.useState('dash');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false });
            const [selectedId, setSelectedId] = React.useState(null);
            
            const [searchSN, setSearchSN] = React.useState('');
            const [searchTag, setSearchTag] = React.useState('');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg, sn = '', tag = '') => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    msg, sn, tag
                });
            };

            const deleteDevice = (id, sn) => {
                if(confirm(`Видалити ПЧ з серійним номером ${sn}?`)) {
                    db.ref(DB_PATH + 'vfds/' + id).remove();
                    logAction(`Видалення з бази`, sn, '');
                }
            };

            const allVfds = Object.entries(data.vfds || {});
            const allLogs = Object.values(data.log || {}).reverse();

            // --- МОДАЛЬНЕ ВІКНО ПЧ ---
            const VfdModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                
                const save = () => {
                    const payload = { ...form, lastUpd: new Date().toLocaleString() };
                    if (mode === 'add') {
                        db.ref(DB_PATH + 'vfds').push(payload);
                        logAction(`Первинна реєстрація`, form.serial, form.tag);
                    } else {
                        db.ref(DB_PATH + 'vfds/' + targetId).update(payload);
                        logAction(`Зміна стану на ${form.status}`, form.serial, form.tag);
                    }
                    setModals({ ...modals, vfd: false, edit: false });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 font-sans">
                        <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl p-10">
                            <h2 className="text-2xl font-black mb-8 uppercase italic text-blue-600 tracking-tighter border-b pb-4">
                                {mode === 'add' ? 'Нова Реєстрація' : 'Редагування Картки'}
                            </h2>
                            <div className="space-y-5">
                                {mode === 'add' && (
                                    <div className="space-y-1">
                                        <p className="text-[10px] font-black text-slate-400 uppercase ml-3">Виберіть модель з довідника</p>
                                        <select className="w-full border-2 p-4 rounded-2xl bg-blue-50 font-bold outline-none" onChange={e => {
                                            const h = data.dict.hardware[e.target.value];
                                            if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                                        }}>
                                            <option value="">Оберіть...</option>
                                            {(data.dict.hardware || []).map((h, i) => <option key={i} value={i}>{h.m} {h.s} ({h.p} кВт)</option>)}
                                        </select>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <p className="text-[10px] font-black text-slate-400 uppercase ml-3">Серійний номер</p>
                                        <input placeholder="S/N..." value={form.serial} className="border-2 border-blue-100 p-4 rounded-2xl w-full font-black text-blue-600 uppercase" onChange={e => setForm({...form, serial: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <p className="text-[10px] font-black text-slate-400 uppercase ml-3">Тег локації</p>
                                        <select className="border-2 p-4 rounded-2xl font-bold text-slate-700 w-full outline-none" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                            <option value="">Вкажіть Тег</option>
                                            {(data.dict.tags || []).map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <p className="text-[10px] font-black text-slate-400 uppercase ml-3">Поточний статус</p>
                                    <select className="w-full border-2 p-4 rounded-2xl bg-slate-900 text-white font-black uppercase tracking-widest" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                        {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="flex gap-4 pt-6">
                                    <button onClick={() => setModals({vfd:false, edit:false})} className="flex-1 font-black text-slate-300 uppercase tracking-widest text-xs">Скасувати</button>
                                    <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black shadow-xl uppercase tracking-widest text-xs" onClick={save}>Зберегти в базу</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- УНІВЕРСАЛЬНА МОДАЛКА ДОВІДНИКА ---
            const GenericModal = ({ title, fields, onSave, onClose }) => {
                const [f, setF] = React.useState({});
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 font-bold">
                        <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
                            <h2 className="font-black mb-8 uppercase italic text-slate-800 tracking-tighter border-b pb-4">{title}</h2>
                            {fields.map(field => (
                                <div key={field.id} className="mb-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase ml-3 mb-1">{field.label}</p>
                                    <input className="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500" onChange={e => setF({...f, [field.id]: e.target.value})} />
                                </div>
                            ))}
                            <div className="flex gap-4 mt-8">
                                <button onClick={onClose} className="flex-1 text-slate-300 uppercase tracking-widest text-[10px]">Назад</button>
                                <button onClick={() => onSave(f)} className="flex-[2] bg-slate-900 text-white p-4 rounded-2xl uppercase tracking-widest text-[10px] shadow-lg">Додати</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse uppercase tracking-[0.3em]">System Core Syncing...</div>;

            if (view === 'hub') return (
                <div className="max-w-6xl mx-auto py-24 px-4 text-center font-sans">
                    <h1 className="text-6xl font-black text-slate-900 mb-20 tracking-tighter uppercase italic">Automation <span className="text-blue-600">Hub</span></h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                        <div onClick={() => setView('vfd')} className="bg-white p-14 rounded-[4rem] shadow-xl border-b-[12px] border-blue-600 cursor-pointer hover:-translate-y-3 transition-all group relative overflow-hidden">
                            <div className="text-8xl mb-8 group-hover:scale-110 transition-transform">🔌</div>
                            <h2 className="text-3xl font-black uppercase tracking-tight">ПЧ</h2>
                            <p className="text-slate-400 mt-3 font-medium">Реєстр та сервісна історія</p>
                        </div>
                        <div className="bg-white/40 p-14 rounded-[4rem] border-b-[12px] border-slate-200 grayscale opacity-40 cursor-not-allowed">
                            <div className="text-8xl mb-8">📟</div>
                            <h2 className="text-3xl font-black uppercase text-slate-400">ПЛК</h2>
                        </div>
                        <div className="bg-white/40 p-14 rounded-[4rem] border-b-[12px] border-slate-200 grayscale opacity-40 cursor-not-allowed">
                            <div className="text-8xl mb-8">📉</div>
                            <h2 className="text-3xl font-black uppercase text-slate-400">ЗВТ</h2>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 font-sans">
                    <header className="flex justify-between items-center mb-10 bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-6">
                            <button onClick={() => setView('hub')} className="bg-slate-100 w-12 h-12 rounded-2xl hover:bg-slate-200 transition-colors font-black text-xl">←</button>
                            <h1 className="text-2xl font-black text-slate-900 uppercase italic">Database <span className="text-blue-600">Pro</span></h1>
                        </div>
                        <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-10 py-4 rounded-3xl font-black shadow-xl shadow-blue-100 uppercase text-xs tracking-widest hover:scale-105 transition-all">+ Реєстрація ПЧ</button>
                    </header>

                    <nav className="flex gap-8 mb-10 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide text-xs font-black uppercase tracking-[0.2em]">
                        {['dash', 'table', 'tiles', 'sn-hist', 'tag-hist', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-5 px-2 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Дашборд' : t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'sn-hist' ? 'Сервісна книжка' : t === 'tag-hist' ? 'Історія Локацій' : t === 'dict' ? 'Довідник' : 'Журнал'}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-6">
                            {[
                                {l: 'Усього', v: allVfds.length, c: 'text-slate-900'},
                                {l: 'В роботі', v: allVfds.filter(([id,v])=>v.status==='В експлуатації').length, c: 'text-emerald-500'},
                                {l: 'Резерв', v: allVfds.filter(([id,v])=>v.status==='Резерв').length, c: 'text-blue-500'},
                                {l: 'Ремонт', v: allVfds.filter(([id,v])=>v.status==='В ремонті').length, c: 'text-amber-500'},
                                {l: 'Списано', v: allVfds.filter(([id,v])=>v.status==='Списаний').length, c: 'text-rose-500'}
                            ].map((s, i) => (
                                <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50"><p className="text-[10px] font-black text-slate-300 uppercase mb-2 tracking-widest">{s.l}</p><p className={`text-5xl font-black ${s.c}`}>{s.v}</p></div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'sn-hist' && (
                        <div className="bg-white p-12 rounded-[3rem] shadow-sm border">
                            <h3 className="text-xs font-black uppercase tracking-widest text-blue-400 mb-6 italic italic">Перегляд за серійним номером</h3>
                            <input placeholder="Введіть S/N обладнання..." className="w-full p-5 border-2 rounded-[2rem] mb-10 font-black text-blue-600 text-xl outline-none focus:border-blue-500 transition-all shadow-inner" onChange={e => setSearchSN(e.target.value)} />
                            <div className="space-y-4">
                                {allLogs.filter(l => l.sn && l.sn === searchSN && searchSN).map((l, i) => (
                                    <div key={i} className="flex gap-8 border-l-8 pl-8 py-4 border-blue-500 bg-slate-50 rounded-r-3xl uppercase text-xs font-bold">
                                        <span className="text-slate-300 font-mono w-44">{l.ts}</span>
                                        <span className="text-slate-700">{l.msg}</span>
                                        <span className="ml-auto text-blue-400 italic font-black">Локація: {l.tag}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'tag-hist' && (
                        <div className="bg-white p-12 rounded-[3rem] shadow-sm border">
                            <h3 className="text-xs font-black uppercase tracking-widest text-emerald-400 mb-6 italic italic">Перегляд історії локації</h3>
                            <select className="w-full p-5 border-2 rounded-[2rem] mb-10 font-black text-emerald-600 text-xl outline-none bg-white cursor-pointer shadow-inner" onChange={e => setSearchTag(e.target.value)}>
                                <option value="">-- Оберіть Тег локації --</option>
                                {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                            </select>
                            <div className="space-y-4">
                                {allLogs.filter(l => l.tag && l.tag === searchTag && searchTag).map((l, i) => (
                                    <div key={i} className="flex gap-8 border-l-8 pl-8 py-4 border-emerald-500 bg-slate-50 rounded-r-3xl uppercase text-xs font-bold">
                                        <span className="text-slate-300 font-mono w-44">{l.ts}</span>
                                        <span className="text-slate-700">{l.msg}</span>
                                        <span className="ml-auto text-emerald-500 italic font-black">S/N: {l.sn}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-[3rem] shadow-sm border overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b tracking-[0.2em]">
                                    <tr><th className="p-8">Дія</th><th className="p-8">Пристрій / S/N</th><th className="p-8">Потужність</th><th className="p-8">Тег</th><th className="p-8">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm font-semibold">
                                    {allVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50 transition-colors group">
                                            <td className="p-8 flex gap-5">
                                                <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 text-xl font-black">✎</button>
                                                <button onClick={() => deleteDevice(id, v.serial)} className="text-red-200 group-hover:text-red-500 transition-all font-bold text-2xl">🗑</button>
                                            </td>
                                            <td className="p-8">
                                                <div className="font-black text-slate-900 uppercase tracking-tighter text-base">{v.manufacturer} {v.series}</div>
                                                <div className="text-[11px] text-blue-500 font-black font-mono mt-1">S/N: {v.serial}</div>
                                            </td>
                                            <td className="p-8 font-black text-slate-500 italic">{v.power} кВт</td>
                                            <td className="p-8 font-black text-slate-700 underline decoration-slate-200">{v.tag}</td>
                                            <td className="p-8"><span className={`px-5 py-2 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 font-black uppercase">
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-sm border border-t-8 border-t-blue-600">
                                <h3 className="text-xs text-blue-600 mb-8 italic tracking-widest">1. Каталог обладнання</h3>
                                <button onClick={() => setModals({...modals, hware: true})} className="w-full p-5 bg-slate-900 text-white rounded-2xl text-xs mb-8 shadow-xl">+ Додати модель</button>
                                <div className="space-y-3">{(data.dict.hardware || []).map((h, i) => <div key={i} className="p-5 bg-slate-50 rounded-2xl text-[11px] border">{h.m} {h.s} ({h.p} кВт)</div>)}</div>
                            </div>
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-sm border border-t-8 border-t-emerald-600">
                                <h3 className="text-xs text-emerald-600 mb-8 italic tracking-widest">2. База локацій (Теги)</h3>
                                <button onClick={() => setModals({...modals, tag: true})} className="w-full p-5 bg-emerald-600 text-white rounded-2xl text-xs mb-8 shadow-xl">+ Додати Тег</button>
                                <div className="flex flex-wrap gap-3">{(data.dict.tags || []).map((t, i) => <span key={i} className="px-5 py-2 bg-slate-50 rounded-xl text-[10px] border border-slate-100">{t}</span>)}</div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-[3rem] shadow-sm border p-12 max-h-[700px] overflow-y-auto scrollbar-hide text-[11px] font-bold">
                            <h3 className="text-[10px] font-black uppercase text-slate-300 mb-10 italic tracking-[0.4em] border-b pb-4 text-center italic">Full Transaction Log</h3>
                            <div className="space-y-5">
                                {allLogs.slice(0, 150).map((l, i) => (
                                    <div key={i} className="flex gap-8 border-l-4 pl-8 py-3 border-slate-100 hover:border-blue-500 transition-colors uppercase">
                                        <span className="text-slate-300 font-mono w-44 shrink-0">{l.ts}</span>
                                        <span className="text-slate-800">{l.msg} <span className="text-blue-400 italic ml-4">[S/N: {l.sn} | Локація: {l.tag}]</span></span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    {modals.hware && <GenericModal title="Нова Модель" fields={[{id:'m', label:'Виробник'}, {id:'s', label:'Серія'}, {id:'p', label:'кВт'}]} onClose={() => setModals({...modals, hware:false})} onSave={(f) => { db.ref(DB_PATH+'dict/hardware').set([...(data.dict.hardware||[]), f]); setModals({...modals, hware:false}); }} />}
                    {modals.tag && <GenericModal title="Новий Тег" fields={[{id:'t', label:'Назва локації'}]} onClose={() => setModals({...modals, tag:false})} onSave={(f) => { db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), f.t]); setModals({...modals, tag:false}); }} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
