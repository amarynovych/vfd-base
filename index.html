<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise | Ultimate Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/'; // Шлях зафіксовано

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { users: [], hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('table');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false, user: false });
            const [selectedId, setSelectedId] = React.useState(null);
            const [currentUser, setCurrentUser] = React.useState(null);
            
            // Фільтри
            const [fMan, setFMan] = React.useState('Всі');
            const [fTag, setFTag] = React.useState('Всі');
            const [fStat, setFStat] = React.useState('Всі');

            React.useEffect(() => {
                const ref = db.ref(DB_PATH);
                ref.on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { users: [], hardware: [], tags: [] } });
                    setLoading(false);
                }, err => {
                    console.error("Firebase Error:", err);
                    setLoading(false);
                });
                return () => ref.off();
            }, []);

            const logAction = (msg) => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    user: currentUser?.name || "Система",
                    msg: msg
                });
            };

            const verify = (name, pin, cb) => {
                const user = (data.dict.users || []).find(u => u.name === name && u.pin === pin);
                if (user) { setCurrentUser(user); cb(); return true; }
                alert("Невірний PIN-код!"); return false;
            };

            const exportToExcel = () => {
                const rows = [["Виробник", "Серія", "Заказний номер", "Потужність", "Тег", "Статус", "Оновлено"]];
                Object.values(data.vfds || {}).forEach(v => {
                    rows.push([v.manufacturer, v.series, v.part, v.power, v.tag, v.status, v.lastUpd]);
                });
                const csv = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `VFD_Export_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const filteredVfds = Object.entries(data.vfds || {}).filter(([id, v]) => {
                return (fMan === 'Всі' || v.manufacturer === fMan) &&
                       (fTag === 'Всі' || v.tag === fTag) &&
                       (fStat === 'Всі' || v.status === fStat);
            });

            // --- УНІВЕРСАЛЬНА МОДАЛКА ДОВІДНИКА ---
            const GenericModal = ({ title, fields, onSave, onClose }) => {
                const [form, setForm] = React.useState({});
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 animate-in zoom-in duration-200">
                            <h2 className="text-xl font-black mb-6 uppercase italic text-slate-800">{title}</h2>
                            <div className="space-y-4">
                                {fields.map(f => (
                                    <div key={f.name}>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1">{f.label}</p>
                                        <input className="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" 
                                        onChange={e => setForm({...form, [f.name]: e.target.value})} />
                                    </div>
                                ))}
                                <div className="flex gap-2 pt-4">
                                    <button onClick={onClose} className="flex-1 font-bold text-slate-400">Назад</button>
                                    <button onClick={() => onSave(form)} className="flex-[2] bg-slate-900 text-white p-3 rounded-xl font-black shadow-lg">ЗБЕРЕГТИ</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- МОДАЛКА ПЧ ---
            const VfdModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв' });
                const [pin, setPin] = React.useState('');
                const [uName, setUName] = React.useState(currentUser?.name || '');

                const onSelectModel = (val) => {
                    const h = data.dict.hardware[val];
                    setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8 overflow-y-auto max-h-[90vh]">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600">{mode === 'add' ? 'Реєстрація ПЧ' : 'Редагування'}</h2>
                            <div className="space-y-4">
                                {mode === 'add' && (
                                    <div className="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 mb-4">
                                        <p className="text-[10px] font-bold text-blue-400 uppercase mb-2">Вибір моделі з каталогу</p>
                                        <select className="w-full border-2 p-3 rounded-xl bg-white font-bold" onChange={e => onSelectModel(e.target.value)}>
                                            <option value="">-- Оберіть модель --</option>
                                            {(data.dict.hardware || []).map((h, i) => <option key={i} value={i}>{h.m} {h.s} ({h.p} кВт)</option>)}
                                        </select>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 gap-4">
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase ml-2">Виробник</p><input disabled value={form.manufacturer} className="bg-slate-50 border-2 p-3 rounded-xl w-full" /></div>
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase ml-2">Серія</p><input disabled value={form.series} className="bg-slate-50 border-2 p-3 rounded-xl w-full" /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase ml-2">Потужність (кВт)</p><input disabled value={form.power} className="bg-slate-50 border-2 p-3 rounded-xl font-bold w-full" /></div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase ml-2">Локація (Тег)</p>
                                        <select className="border-2 p-3 rounded-xl font-bold text-blue-600 w-full" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                            <option value="">Оберіть Тег</option>
                                            {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2">Статус пристрою</p>
                                    <select className="w-full border-2 p-3 rounded-xl bg-slate-50 font-bold" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                        {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="bg-slate-900 p-6 rounded-2xl grid grid-cols-2 gap-4 mt-6">
                                    <select className="p-2 border rounded-lg bg-white" value={uName} onChange={e => setUName(e.target.value)}>
                                        <option value="">Відповідальний</option>
                                        {(data.dict.users || []).map(u => <option key={u.name}>{u.name}</option>)}
                                    </select>
                                    <input type="password" placeholder="PIN-код" className="p-2 border rounded-lg text-center" onChange={e => setPin(e.target.value)} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setModals({...modals, vfd:false, edit:false})} className="flex-1 font-bold text-slate-400">Назад</button>
                                    <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg uppercase" 
                                    onClick={() => verify(uName, pin, () => {
                                        if(mode==='add'){
                                            db.ref(DB_PATH+'vfds').push({...form, lastUpd: new Date().toLocaleString()});
                                            logAction(`Додано ПЧ: ${form.manufacturer} ${form.series}`);
                                        } else {
                                            db.ref(DB_PATH+'vfds/'+targetId).update({...form, lastUpd: new Date().toLocaleString()});
                                            logAction(`Оновлено ПЧ: ${form.manufacturer} (${form.status})`);
                                        }
                                        setModals({...modals, vfd:false, edit:false});
                                    })}>Підтвердити</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900">
                    <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-white font-black tracking-widest uppercase animate-pulse">З'єднання з Firebase...</p>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white font-black">V</div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">VFD <span className="text-blue-600">Pro</span></h1>
                        </div>
                        <div className="flex gap-3">
                             <button onClick={exportToExcel} className="bg-white border-2 border-slate-200 px-6 py-3 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">Excel</button>
                             <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-xl shadow-blue-100 hover:scale-105 transition-all">+ ПЧ</button>
                        </div>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide">
                        {['dash', 'table', 'tiles', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 px-2 text-xs font-black uppercase tracking-widest transition-all ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Статистика' : t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'dict' ? 'Довідник' : 'Журнал'}
                            </button>
                        ))}
                    </nav>

                    {(activeTab === 'table' || activeTab === 'tiles') && (
                        <div className="flex flex-wrap gap-4 mb-6 bg-slate-200/50 p-3 rounded-2xl border border-slate-200">
                            <select className="p-2 border rounded-xl text-xs font-bold bg-white" onChange={e => setFMan(e.target.value)}>
                                <option>Всі виробники</option>
                                {[...new Set(Object.values(data.vfds || {}).map(v => v.manufacturer))].map(m => <option key={m}>{m}</option>)}
                            </select>
                            <select className="p-2 border rounded-xl text-xs font-bold bg-white" onChange={e => setFTag(e.target.value)}>
                                <option>Всі локації</option>
                                {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                            </select>
                            <select className="p-2 border rounded-xl text-xs font-bold bg-white" onChange={e => setFStat(e.target.value)}>
                                <option>Всі статуси</option>
                                {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                            </select>
                        </div>
                    )}

                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            {[
                                {l: 'Усього', v: Object.keys(data.vfds || {}).length, c: 'text-slate-900'},
                                {l: 'В роботі', v: Object.values(data.vfds || {}).filter(v=>v.status==='В експлуатації').length, c: 'text-emerald-500'},
                                {l: 'Резерв', v: Object.values(data.vfds || {}).filter(v=>v.status==='Резерв').length, c: 'text-blue-500'},
                                {l: 'Ремонт', v: Object.values(data.vfds || {}).filter(v=>v.status==='В ремонті').length, c: 'text-rose-500'}
                            ].map((s, i) => (
                                <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 transition-transform hover:scale-[1.02]">
                                    <p className="text-[10px] font-black text-slate-300 uppercase mb-1 tracking-widest italic">{s.l}</p>
                                    <p className={`text-5xl font-black ${s.c}`}>{s.v}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                                    <tr><th className="p-6">Дія</th><th className="p-6">Пристрій</th><th className="p-6">Потужність</th><th className="p-6">Локація</th><th className="p-6">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50/80 transition-colors">
                                            <td className="p-6"><button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="bg-slate-100 p-2 rounded-lg text-blue-500 hover:bg-blue-500 hover:text-white transition-all">✎</button></td>
                                            <td className="p-6"><div className="font-black text-slate-800 uppercase tracking-tighter leading-none mb-1">{v.manufacturer} {v.series}</div><div className="text-[10px] font-mono text-slate-400 italic uppercase">{v.part}</div></td>
                                            <td className="p-6 font-bold text-slate-600">{v.power} кВт</td>
                                            <td className="p-6 font-black text-blue-600 underline underline-offset-4 decoration-blue-100">{v.tag}</td>
                                            <td className="p-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'tiles' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredVfds.map(([id, v]) => (
                                <div key={id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 relative hover:shadow-xl transition-all group overflow-hidden">
                                    <div className="absolute top-0 right-0 h-1 w-full bg-slate-100 group-hover:bg-blue-500 transition-colors"></div>
                                    <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="absolute top-6 right-6 opacity-0 group-hover:opacity-100 bg-blue-600 text-white p-2 rounded-lg text-xs font-bold transition-all">РЕДАГУВАТИ</button>
                                    <h3 className="text-2xl font-black text-slate-900 tracking-tighter mb-1 uppercase leading-none">{v.manufacturer}</h3>
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-6 italic tracking-widest">{v.series}</p>
                                    <div className="space-y-3 border-t pt-5 border-slate-50">
                                        <div className="flex justify-between text-sm"><span className="text-slate-300 font-bold uppercase text-[9px]">Локація:</span><span className="font-bold text-blue-600 italic underline underline-offset-2 decoration-blue-100">{v.tag}</span></div>
                                        <div className="flex justify-between text-sm"><span className="text-slate-300 font-bold uppercase text-[9px]">Потужність:</span><span className="font-black text-slate-700">{v.power} кВт</span></div>
                                        <div className="pt-2"><span className="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-500">{v.status}</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border">
                                <h3 className="font-black text-[10px] uppercase text-blue-600 mb-6 underline underline-offset-8 decoration-4">1. Каталог моделей</h3>
                                <div className="space-y-2 mb-6 max-h-64 overflow-y-auto pr-2 scrollbar-hide">
                                    {(data.dict.hardware || []).map((h, i) => <div key={i} className="p-4 bg-slate-50 rounded-2xl border border-slate-100"><p className="font-black text-slate-700 text-sm">{h.m} {h.s}</p><p className="text-[10px] text-slate-400 font-mono italic">{h.p} кВт | {h.part}</p></div>)}
                                </div>
                                <button onClick={() => setModals({...modals, hware: true})} className="w-full p-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-slate-200">+ ДОДАТИ МОДЕЛЬ</button>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border">
                                <h3 className="font-black text-[10px] uppercase text-emerald-600 mb-6 underline underline-offset-8 decoration-4">2. Теги локацій</h3>
                                <div className="flex flex-wrap gap-2 mb-6">{(data.dict.tags || []).map((t, i) => <span key={i} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-[10px] font-black uppercase">{t}</span>)}</div>
                                <button onClick={() => setModals({...modals, tag: true})} className="w-full p-4 bg-emerald-100 text-emerald-700 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-50">+ ДОДАТИ ТЕГ</button>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border">
                                <h3 className="font-black text-[10px] uppercase text-rose-600 mb-6 underline underline-offset-8 decoration-4">3. Відповідальні</h3>
                                <div className="space-y-2 mb-6">{(data.dict.users || []).map((u, i) => <div key={i} className="p-4 bg-rose-50 rounded-2xl border border-rose-100 flex justify-between items-center"><span className="font-black text-rose-900 text-xs uppercase">{u.name}</span><span className="text-rose-200 font-mono text-xs italic">PIN: {u.pin}</span></div>)}</div>
                                <button onClick={() => setModals({...modals, user: true})} className="w-full p-4 bg-rose-100 text-rose-700 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-rose-50">+ ДОДАТИ ПЕРСОНУ</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-[2rem] shadow-sm border p-10 max-h-[600px] overflow-y-auto">
                            <h3 className="text-xs font-black uppercase text-slate-300 mb-8 italic tracking-widest border-b pb-4">System Activity Log</h3>
                            <div className="space-y-4">
                                {Object.values(data.log || {}).reverse().map((l, i) => (
                                    <div key={i} className="flex gap-6 border-l-2 pl-6 py-2 relative border-slate-100">
                                        <div className="absolute -left-[5px] top-4 w-2 h-2 rounded-full bg-blue-500 shadow-sm shadow-blue-200"></div>
                                        <div className="text-[10px] font-mono text-slate-400 w-36 shrink-0">{l.ts}</div>
                                        <div className="text-[10px] font-black text-blue-600 uppercase w-24 shrink-0 truncate">{l.user}</div>
                                        <div className="text-xs font-medium text-slate-600 tracking-tight">{l.msg}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    {modals.hware && <GenericModal title="Нова модель ПЧ" fields={[{name:'m', label:'Виробник'}, {name:'s', label:'Серія'}, {name:'p', label:'Потужність (кВт)'}, {name:'part', label:'Заказний номер'}]} 
                        onClose={() => setModals({...modals, hware:false})} onSave={(f) => { db.ref(DB_PATH+'dict/hardware').set([...(data.dict.hardware||[]), f]); setModals({...modals, hware:false}); logAction(`Довідник: додано модель ${f.m} ${f.s}`); }} />}
                    {modals.tag && <GenericModal title="Новий Тег" fields={[{name:'t', label:'Назва тегу (напр. P-101)'}]} 
                        onClose={() => setModals({...modals, tag:false})} onSave={(f) => { db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), f.t]); setModals({...modals, tag:false}); logAction(`Довідник: додано тег ${f.t}`); }} />}
                    {modals.user && <GenericModal title="Нова персона" fields={[{name:'name', label:'Ім’я'}, {name:'pin', label:'PIN-код'}]} 
                        onClose={() => setModals({...modals, user:false})} onSave={(f) => { db.ref(DB_PATH+'dict/users').set([...(data.dict.users||[]), f]); setModals({...modals, user:false}); logAction(`Довідник: додано персонал ${f.name}`); }} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
