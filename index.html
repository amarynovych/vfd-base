<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спільна база ПЧ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ваша конфігурація Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const App = () => {
            const [vfds, setVfds] = React.useState([]);
            const [history, setHistory] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            // Завантаження даних
            React.useEffect(() => {
                const dbRef = ref(db, 'vfd_data/');
                onValue(dbRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setVfds(data.vfds || []);
                        setHistory(data.history || []);
                    }
                    setLoading(false);
                });
            }, []);

            const sync = (newList, newHistory) => {
                set(ref(db, 'vfd_data/'), {
                    vfds: newList,
                    history: newHistory || history
                });
            };

            const addExample = () => {
                const newVfd = {
                    id: Date.now(),
                    numId: vfds.length + 1,
                    manufacturer: "Siemens",
                    series: "G120",
                    power: 7.5,
                    status: "Резерв",
                    position: "Склад"
                };
                const newHist = [{ts: new Date().toLocaleString(), msg: "Додано тестовий ПЧ"}, ...history];
                sync([...vfds, newVfd], newHist);
            };

            if (loading) return <div className="flex h-screen items-center justify-center">Підключення до бази...</div>;

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
                        <h1 className="text-2xl font-bold text-slate-800">🔌 Реєстр ПЧ (Командний доступ)</h1>
                        <button onClick={addExample} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition">
                            + Додати ПЧ
                        </button>
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-slate-50 border-b">
                                <tr>
                                    <th className="p-4 font-semibold text-slate-600">ID</th>
                                    <th className="p-4 font-semibold text-slate-600">Виробник</th>
                                    <th className="p-4 font-semibold text-slate-600">Серія</th>
                                    <th className="p-4 font-semibold text-slate-600">Потужність</th>
                                    <th className="p-4 font-semibold text-slate-600">Статус</th>
                                    <th className="p-4 font-semibold text-slate-600">Позиція</th>
                                </tr>
                            </thead>
                            <tbody>
                                {vfds.length === 0 ? (
                                    <tr><td colSpan="6" className="p-10 text-center text-slate-400">База порожня. Натисніть кнопку "Додати ПЧ"</td></tr>
                                ) : (
                                    vfds.map(v => (
                                        <tr key={v.id} className="border-b hover:bg-slate-50 transition">
                                            <td className="p-4">#{v.numId}</td>
                                            <td className="p-4 font-medium">{v.manufacturer}</td>
                                            <td className="p-4">{v.series}</td>
                                            <td className="p-4">{v.power} кВт</td>
                                            <td className="p-4">
                                                <span className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold">
                                                    {v.status}
                                                </span>
                                            </td>
                                            <td className="p-4 text-slate-500">{v.position}</td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>

                    {history.length > 0 && (
                        <div className="mt-8 bg-white p-4 rounded-lg shadow-sm text-sm text-slate-600">
                            <h3 className="font-bold mb-2">Останні дії:</h3>
                            {history.slice(0, 5).map((h, i) => (
                                <div key={i} className="border-l-2 border-blue-200 pl-2 mb-1">
                                    <span className="text-slate-400">{h.ts}:</span> {h.msg}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
