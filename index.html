<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise | Dynamic Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('vfd'); 
            const [activeTab, setActiveTab] = React.useState('dash');
            const [groupKey, setGroupKey] = React.useState('status'); // Ключ для групування
            const [modals, setModals] = React.useState({ vfd: false, edit: false });
            const [selectedId, setSelectedId] = React.useState(null);

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const allVfds = Object.values(data.vfds || {});

            // Функція динамічного групування
            const getGroupedData = () => {
                const groups = {};
                allVfds.forEach(v => {
                    const val = v[groupKey] || 'Без категорії';
                    groups[val] = (groups[val] || 0) + 1;
                });
                return groups;
            };

            const groupedData = getGroupedData();

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 font-sans">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2.5rem] shadow-sm border">
                        <h1 className="text-xl font-black uppercase italic">VFD <span className="text-blue-600">Analytics</span></h1>
                        <button onClick={() => setView('hub')} className="text-xs font-black uppercase text-slate-400">На головну</button>
                    </header>

                    {/* Навігація та налаштування Дашборду */}
                    <div className="flex justify-between items-center mb-6">
                        <nav className="flex gap-6 border-b-2 overflow-x-auto scrollbar-hide text-[10px] font-black uppercase tracking-[0.2em]">
                            {['dash', 'table'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                    {t === 'dash' ? 'Дашборд' : 'Реєстр'}
                                </button>
                            ))}
                        </nav>
                        
                        {activeTab === 'dash' && (
                            <select 
                                className="p-3 bg-white border-2 rounded-xl font-black text-xs uppercase tracking-widest outline-none" 
                                onChange={(e) => setGroupKey(e.target.value)}
                                value={groupKey}
                            >
                                <option value="status">Групувати за Статусом</option>
                                <option value="manufacturer">Групувати за Виробником</option>
                                <option value="tag">Групувати за Тегом</option>
                                <option value="power">Групувати за Потужністю</option>
                            </select>
                        )}
                    </div>

                    {/* Динамічний Дашборд */}
                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {Object.entries(groupedData).map(([key, count], i) => (
                                <div key={i} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 transition-all hover:scale-105">
                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">{groupKey}</p>
                                    <p className="text-xl font-black text-slate-800 mb-1 uppercase truncate">{key}</p>
                                    <p className="text-4xl font-black text-blue-600">{count}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border p-6">
                             <p className="text-slate-400 font-bold p-10 text-center">Реєстр (Тут відображається ваш повний список ПЧ)</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
