<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Automation Hub | Service Log Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('hub');
            const [activeTab, setActiveTab] = React.useState('dash');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false });
            const [selectedId, setSelectedId] = React.useState(null);
            
            const [fMan, setFMan] = React.useState('Всі виробники');
            const [fTag, setFTag] = React.useState('Всі локації');
            const [fStat, setFStat] = React.useState('Всі статуси');
            const [logFilter, setLogFilter] = React.useState(''); // Для пошуку в журналі (S/N або Тег)

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg, serial = '', tag = '') => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    user: "Адмін",
                    msg: msg,
                    serial: serial,
                    tag: tag
                });
            };

            const openHistory = (filterValue) => {
                setLogFilter(filterValue);
                setActiveTab('log');
            };

            const filteredVfds = Object.entries(data.vfds || {}).filter(([id, v]) => {
                const matchMan = fMan === 'Всі виробники' || v.manufacturer === fMan;
                const matchTag = fTag === 'Всі локації' || v.tag === fTag;
                const matchStat = fStat === 'Всі статуси' || v.status === fStat;
                return matchMan && matchTag && matchStat;
            });

            const filteredLogs = Object.values(data.log || {}).reverse().filter(l => {
                if (!logFilter) return true;
                return (l.serial && l.serial.includes(logFilter)) || (l.tag && l.tag.includes(logFilter)) || (l.msg && l.msg.includes(logFilter));
            });

            // --- МОДАЛКА ПЧ ---
            const VfdFormModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                const hardware = data.dict.hardware || [];
                
                const save = () => {
                    const payload = { ...form, lastUpd: new Date().toLocaleString() };
                    if (mode === 'add') {
                        db.ref(DB_PATH + 'vfds').push(payload);
                        logAction(`Реєстрація ПЧ: ${form.manufacturer}`, form.serial, form.tag);
                    } else {
                        db.ref(DB_PATH + 'vfds/' + targetId).update(payload);
                        logAction(`Зміна статусу на ${form.status}`, form.serial, form.tag);
                    }
                    setModals({ vfd: false, edit: false });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8 max-h-[90vh] overflow-y-auto">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600 tracking-tighter">Внести дані</h2>
                            <div className="space-y-4">
                                {mode === 'add' && (
                                    <select className="w-full border-2 p-3 rounded-xl bg-blue-50 font-bold" onChange={e => {const h = hardware[e.target.value]; if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p})}}>
                                        <option value="">-- Оберіть модель з каталогу --</option>
                                        {hardware.map((h, i) => <option key={i} value={i}>{h.m} {h.s}</option>)}
                                    </select>
                                )}
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Виробник" value={form.manufacturer} className="border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, manufacturer: e.target.value})} />
                                    <input placeholder="Серійний №" value={form.serial} className="border-2 border-blue-400 p-3 rounded-xl w-full font-black" onChange={e => setForm({...form, serial: e.target.value})} />
                                </div>
                                <select className="w-full border-2 p-3 rounded-xl font-bold text-blue-600" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                    <option value="">-- Локація (Тег) --</option>
                                    {(data.dict.tags || []).map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                                <select className="w-full border-2 p-3 rounded-xl bg-slate-900 text-white font-black uppercase" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <button className="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg uppercase" onClick={save}>Зберегти зміни</button>
                                <button onClick={() => setModals({vfd:false, edit:false})} className="w-full text-slate-400 font-bold uppercase text-xs">Скасувати</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">СИНХРОНІЗАЦІЯ ЖУРНАЛІВ...</div>;

            if (view === 'hub') return (
                <div className="max-w-6xl mx-auto py-20 px-4 text-center">
                    <h1 className="text-5xl font-black text-slate-900 mb-16 tracking-tighter uppercase italic">Automation <span className="text-blue-600">Hub</span></h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                        <div onClick={() => setView('vfd')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-8 border-blue-600 cursor-pointer hover:-translate-y-2 transition-all group">
                            <div className="text-7xl mb-6">⚡</div>
                            <h2 className="text-2xl font-black uppercase">ПЧ</h2>
                            <p className="text-slate-400 mt-2">База та сервісні журнали</p>
                        </div>
                        <div className="bg-white/50 p-12 rounded-[3.5rem] border-b-8 border-slate-200 grayscale opacity-50 cursor-not-allowed">
                            <div className="text-7xl mb-6">🤖</div>
                            <h2 className="text-2xl font-black uppercase text-slate-400">Контролери</h2>
                        </div>
                        <div className="bg-white/50 p-12 rounded-[3.5rem] border-b-8 border-slate-200 grayscale opacity-50 cursor-not-allowed">
                            <div className="text-7xl mb-6">📉</div>
                            <h2 className="text-2xl font-black uppercase text-slate-400">ЗВТ</h2>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('hub')} className="bg-slate-100 w-10 h-10 rounded-xl hover:bg-slate-200 transition-colors">←</button>
                            <h1 className="text-xl font-black text-slate-900 uppercase">Реєстр <span className="text-blue-600">ПЧ</span></h1>
                        </div>
                        <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl uppercase text-[11px]">+ Реєстрація</button>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide text-[11px] font-black uppercase tracking-[0.2em]">
                        {['dash', 'table', 'tiles', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => {setActiveTab(t); if(t !== 'log') setLogFilter('')}} className={`pb-4 px-2 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Дашборд' : t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'dict' ? 'Довідник' : 'Журнал подій'}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b tracking-widest">
                                    <tr><th className="p-6">Дія</th><th className="p-6">Пристрій / S/N</th><th className="p-6">Локація (Тег)</th><th className="p-6">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {filteredVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50 transition-colors group">
                                            <td className="p-6 flex gap-4">
                                                <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold">✎</button>
                                                <button onClick={() => openHistory(v.serial)} title="Історія ПЧ" className="text-slate-400 hover:text-slate-900 text-lg">📜</button>
                                            </td>
                                            <td className="p-6">
                                                <div className="font-black text-slate-800 uppercase tracking-tighter">{v.manufacturer} {v.series}</div>
                                                <div className="text-[10px] text-blue-500 font-bold font-mono">S/N: {v.serial}</div>
                                            </td>
                                            <td className="p-6">
                                                <button onClick={() => openHistory(v.tag)} className="font-black text-slate-600 hover:text-blue-600 underline decoration-slate-200">{v.tag}</button>
                                            </td>
                                            <td className="p-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'tiles' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredVfds.map(([id, v]) => (
                                <div key={id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border relative border-t-8 border-t-slate-800 hover:shadow-xl transition-all group">
                                    <div className="flex justify-between mb-4">
                                        <h3 className="text-2xl font-black uppercase tracking-tighter">{v.manufacturer}</h3>
                                        <button onClick={() => openHistory(v.serial)} className="bg-slate-50 p-2 rounded-lg text-xs font-bold hover:bg-blue-50 transition-colors">ІСТОРІЯ ПЧ</button>
                                    </div>
                                    <div className="space-y-3 border-t pt-4">
                                        <div className="flex justify-between"><span className="text-[9px] font-black text-slate-300 uppercase italic">S/N:</span><span className="font-mono font-black text-blue-600">{v.serial}</span></div>
                                        <div className="flex justify-between"><span className="text-[9px] font-black text-slate-300 uppercase italic">Тег:</span><button onClick={() => openHistory(v.tag)} className="font-black underline decoration-slate-200">{v.tag}</button></div>
                                        <div className="pt-4 flex justify-between items-center">
                                            <span className="text-[10px] font-black uppercase text-slate-400">{v.status}</span>
                                            <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold text-xs">✎ Редагувати</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border p-10">
                            <div className="flex justify-between items-center mb-10 border-b pb-4">
                                <h3 className="text-xs font-black uppercase tracking-[0.3em] text-slate-300 italic">
                                    {logFilter ? `Журнал: ${logFilter}` : 'Загальний журнал подій'}
                                </h3>
                                {logFilter && <button onClick={() => setLogFilter('')} className="bg-rose-50 text-rose-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Скинути фільтр</button>}
                            </div>
                            <div className="space-y-6 max-h-[600px] overflow-y-auto pr-4 scrollbar-hide">
                                {filteredLogs.length > 0 ? filteredLogs.map((l, i) => (
                                    <div key={i} className="flex gap-8 border-l-4 pl-8 py-1 relative border-slate-100 hover:border-blue-500 transition-all group">
                                        <div className="absolute -left-[6px] top-3 w-3 h-3 rounded-full bg-white border-2 border-blue-500"></div>
                                        <div className="text-[10px] font-mono text-slate-300 w-36 shrink-0 leading-loose">{l.ts}</div>
                                        <div className="flex-1">
                                            <div className="text-xs font-bold text-slate-700 uppercase tracking-tight">{l.msg}</div>
                                            {(l.serial || l.tag) && <div className="text-[9px] font-black text-blue-400 uppercase mt-1">
                                                {l.serial && <span className="mr-4">S/N: {l.serial}</span>}
                                                {l.tag && <span>ТЕГ: {l.tag}</span>}
                                            </div>}
                                        </div>
                                    </div>
                                )) : <div className="py-20 text-center text-slate-300 font-black uppercase tracking-widest">Записів не знайдено</div>}
                            </div>
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdFormModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
