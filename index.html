<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VFD Pro | Automation Registry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, dict: { hardware: [], tags: [], departments: [], units: [] } });
            const [modals, setModals] = React.useState({ vfd: false });

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => setData(snap.val() || { vfds: {}, dict: { hardware: [], tags: [], departments: [], units: [] } }));
            }, []);

            const VfdModal = () => {
                const [form, setForm] = React.useState({ manufacturer: '', series: '', part: '', power: '', serial: '', department: '', unit: '', tag: '', status: 'Резерв', comment: '' });
                
                const save = () => {
                    db.ref(DB_PATH + 'vfds').push({...form, lastUpd: new Date().toLocaleString()});
                    setModals({ vfd: false });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-[2rem] p-8 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                            <h2 className="text-xl font-black mb-6 uppercase">Реєстрація ПЧ</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <select className="border p-3 rounded-xl" onChange={e => {
                                    const h = data.dict.hardware[e.target.value];
                                    if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                                }}>
                                    <option>-- Оберіть модель з довідника --</option>
                                    {(data.dict.hardware || []).map((h, i) => <option key={i} value={i}>{h.m} {h.s}</option>)}
                                </select>
                                <input placeholder="Серійний №" className="border p-3 rounded-xl" onChange={e => setForm({...form, serial: e.target.value})} />
                                <select className="border p-3 rounded-xl" onChange={e => setForm({...form, department: e.target.value})}>
                                    <option>Департамент</option>
                                    {(data.dict.departments || []).map(d => <option key={d}>{d}</option>)}
                                </select>
                                <select className="border p-3 rounded-xl" onChange={e => setForm({...form, unit: e.target.value})}>
                                    <option>Одиниця</option>
                                    {(data.dict.units || []).map(u => <option key={u}>{u}</option>)}
                                </select>
                                <select className="border p-3 rounded-xl" onChange={e => setForm({...form, tag: e.target.value})}>
                                    <option>Тег</option>
                                    {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                                </select>
                                <select className="border p-3 rounded-xl" onChange={e => setForm({...form, status: e.target.value})}>
                                    <option>Статус</option>
                                    <option>В роботі</option><option>Резерв</option><option>Ремонт</option>
                                </select>
                                <textarea placeholder="Коментар" className="col-span-2 border p-3 rounded-xl" onChange={e => setForm({...form, comment: e.target.value})} />
                            </div>
                            <button onClick={save} className="w-full mt-6 bg-blue-600 text-white p-4 rounded-xl font-black uppercase">Зберегти</button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="p-8">
                    <header className="flex justify-between mb-8">
                        <h1 className="text-2xl font-black">VFD Pro Hub</h1>
                        <button onClick={() => setModals({vfd: true})} className="bg-blue-600 text-white px-6 py-2 rounded-lg">+ Реєстрація</button>
                    </header>
                    
                    {/* Дашборд */}
                    <div className="grid grid-cols-3 gap-6 mb-8">
                        <div className="bg-white p-6 rounded-2xl border">Статуси: {Object.keys(data.vfds).length}</div>
                        <div className="bg-white p-6 rounded-2xl border">Виробники: 5</div>
                        <div className="bg-white p-6 rounded-2xl border">Потужність: 120 кВт</div>
                    </div>

                    {/* Таблиця */}
                    <table className="w-full bg-white rounded-2xl overflow-hidden border">
                        <thead className="bg-gray-100">
                            <tr>
                                <th className="p-4">Виробник</th><th className="p-4">Модель</th><th className="p-4">Заказний код</th>
                                <th className="p-4">Потужність</th><th className="p-4">S/N</th><th className="p-4">Тег</th>
                                <th className="p-4">Статус</th><th className="p-4">Оновлено</th>
                            </tr>
                        </thead>
                        <tbody>
                            {Object.entries(data.vfds).map(([id, v]) => (
                                <tr key={id} className="border-t">
                                    <td className="p-4">{v.manufacturer}</td><td className="p-4">{v.series}</td><td className="p-4">{v.part}</td>
                                    <td className="p-4">{v.power}</td><td className="p-4">{v.serial}</td><td className="p-4">{v.tag}</td>
                                    <td className="p-4">{v.status}</td><td className="p-4">{v.lastUpd}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {modals.vfd && <VfdModal />}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
