<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VFD Pro | База даних</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [data, setData] = React.useState({ vfds: {}, dict: { hardware: [], tags: [], departments: [], units: [] } });
            
            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => setData(snap.val() || { vfds: {}, dict: { hardware: [], tags: [], departments: [], units: [] } }));
            }, []);

            return (
                <div className="min-h-screen bg-gray-100 p-8">
                    {/* Навігація */}
                    <nav className="flex gap-4 mb-8">
                        {['dashboard', 'table', 'add'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} 
                                className={`px-6 py-2 rounded-xl font-bold uppercase ${activeTab === tab ? 'bg-blue-600 text-white' : 'bg-white'}`}>
                                {tab === 'dashboard' ? 'Дашборди' : tab === 'table' ? 'Таблиця ПЧ' : 'Реєстрація ПЧ'}
                            </button>
                        ))}
                    </nav>

                    {/* Контент вкладок */}
                    {activeTab === 'dashboard' && (
                        <div className="grid grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow">Статус: {Object.keys(data.vfds).length} ПЧ</div>
                            <div className="bg-white p-6 rounded-2xl shadow">Департаменти: {(data.dict.departments || []).length}</div>
                            <div className="bg-white p-6 rounded-2xl shadow">Одиниці: {(data.dict.units || []).length}</div>
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-2xl shadow overflow-hidden">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="p-4">Виробник</th><th className="p-4">Модель</th><th className="p-4">Заказний код</th>
                                        <th className="p-4">Потужність</th><th className="p-4">Серійний №</th><th className="p-4">Тег</th>
                                        <th className="p-4">Статус</th><th className="p-4">Оновлено</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.entries(data.vfds || {}).map(([id, v]) => (
                                        <tr key={id} className="border-t">
                                            <td className="p-4">{v.manufacturer}</td><td className="p-4">{v.series}</td><td className="p-4">{v.part}</td>
                                            <td className="p-4">{v.power}</td><td className="p-4">{v.serial}</td><td className="p-4">{v.tag}</td>
                                            <td className="p-4">{v.status}</td><td className="p-4">{v.lastUpd}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'add' && <RegistrationForm data={data} />}
                </div>
            );
        }

        function RegistrationForm({ data }) {
            const [form, setForm] = React.useState({ manufacturer: '', series: '', part: '', power: '', serial: '', department: '', unit: '', tag: '', status: 'Резерв', comment: '' });
            
            const save = () => {
                db.ref(DB_PATH + 'vfds').push({...form, lastUpd: new Date().toLocaleString()});
                alert("Дані збережено!");
            };

            return (
                <div className="bg-white p-8 rounded-2xl shadow max-w-2xl">
                    <h2 className="text-xl font-black mb-6 uppercase">Реєстрація нового ПЧ</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <select className="border p-3 rounded-xl col-span-2" onChange={e => {
                            const h = data.dict.hardware[e.target.value];
                            if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                        }}>
                            <option>-- Оберіть модель (автозаповнення) --</option>
                            {(data.dict.hardware || []).map((h, i) => <option key={i} value={i}>{h.m} / {h.s}</option>)}
                        </select>
                        <input placeholder="Серійний номер" className="border p-3 rounded-xl" onChange={e => setForm({...form, serial: e.target.value})} />
                        <select className="border p-3 rounded-xl" onChange={e => setForm({...form, department: e.target.value})}>
                            <option>Департамент</option>{(data.dict.departments || []).map(d => <option key={d}>{d}</option>)}
                        </select>
                        <select className="border p-3 rounded-xl" onChange={e => setForm({...form, unit: e.target.value})}>
                            <option>Одиниця</option>{(data.dict.units || []).map(u => <option key={u}>{u}</option>)}
                        </select>
                        <select className="border p-3 rounded-xl" onChange={e => setForm({...form, tag: e.target.value})}>
                            <option>Тег</option>{(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                        </select>
                        <select className="border p-3 rounded-xl" onChange={e => setForm({...form, status: e.target.value})}>
                            <option>В роботі</option><option>Резерв</option><option>Ремонт</option><option>Списаний</option>
                        </select>
                        <textarea className="col-span-2 border p-3 rounded-xl" placeholder="Коментар" onChange={e => setForm({...form, comment: e.target.value})} />
                        <button onClick={save} className="col-span-2 bg-blue-600 text-white p-4 rounded-xl font-bold uppercase">Зберегти до бази</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
