<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise | Analytics Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dash');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, hwareEdit: false });
            const [selectedId, setSelectedId] = React.useState(null);
            const [editIdx, setEditIdx] = React.useState(null);
            
            const [fMan, setFMan] = React.useState('Всі виробники');
            const [fTag, setFTag] = React.useState('Всі локації');
            const [fStat, setFStat] = React.useState('Всі статуси');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg) => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    user: "Адмін",
                    msg: msg
                });
            };

            const exportToExcel = () => {
                const rows = [["Виробник", "Серія", "Заказний номер", "Потужність", "S/N", "Тег", "Статус", "Оновлено"]];
                Object.values(data.vfds || {}).forEach(v => {
                    rows.push([v.manufacturer||"", v.series||"", v.part||"", v.power||"", v.serial||"", v.tag||"", v.status||"", v.lastUpd||""]);
                });
                const csvContent = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `VFD_Export.csv`;
                link.click();
            };

            const allVfds = Object.entries(data.vfds || {});
            
            const filteredVfds = allVfds.filter(([id, v]) => {
                const matchMan = fMan === 'Всі виробники' || v.manufacturer === fMan;
                const matchTag = fTag === 'Всі локації' || v.tag === fTag;
                const matchStat = fStat === 'Всі статуси' || v.status === fStat;
                return matchMan && matchTag && matchStat;
            });

            // --- ОБЧИСЛЕННЯ СТАТИСТИКИ ---
            const stats = {
                status: {
                    total: allVfds.length,
                    work: allVfds.filter(([id,v]) => v.status === 'В експлуатації').length,
                    reserve: allVfds.filter(([id,v]) => v.status === 'Резерв').length,
                    repair: allVfds.filter(([id,v]) => v.status === 'В ремонті').length,
                    trash: allVfds.filter(([id,v]) => v.status === 'Списаний').length,
                },
                power: {
                    low: allVfds.filter(([id,v]) => parseFloat(v.power) <= 5.5).length,
                    mid: allVfds.filter(([id,v]) => parseFloat(v.power) > 5.5 && parseFloat(v.power) <= 22).length,
                    high: allVfds.filter(([id,v]) => parseFloat(v.power) > 22).length,
                },
                manufacturers: allVfds.reduce((acc, [id, v]) => {
                    const m = v.manufacturer || 'Інше';
                    acc[m] = (acc[m] || 0) + 1;
                    return acc;
                }, {})
            };

            const VfdFormModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                const hardware = data.dict.hardware || [];
                
                const onSelectModel = (val) => {
                    const h = hardware[val];
                    if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                };

                const save = () => {
                    const payload = { ...form, lastUpd: new Date().toLocaleString() };
                    if (mode === 'add') db.ref(DB_PATH + 'vfds').push(payload);
                    else db.ref(DB_PATH + 'vfds/' + targetId).update(payload);
                    setModals({ vfd: false, edit: false });
                    logAction(`${mode === 'add' ? 'Додано' : 'Змінено'} ПЧ: ${form.manufacturer} ${form.serial}`);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8 max-h-[90vh] overflow-y-auto">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600">{mode === 'add' ? 'Нова Реєстрація' : 'Редагування'}</h2>
                            <div className="space-y-4">
                                {mode === 'add' && (
                                    <select className="w-full border-2 p-3 rounded-xl bg-blue-50 font-bold" onChange={e => onSelectModel(e.target.value)}>
                                        <option value="">-- Оберіть модель з Довідника --</option>
                                        {hardware.map((h, i) => <option key={i} value={i}>{h.m} {h.s} ({h.p} кВт)</option>)}
                                    </select>
                                )}
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Виробник" value={form.manufacturer} className="border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, manufacturer: e.target.value})} />
                                    <input placeholder="Серія" value={form.series} className="border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, series: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Заказний код" value={form.part} className="border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, part: e.target.value})} />
                                    <input placeholder="Серійний номер" value={form.serial} className="border-2 border-blue-200 p-3 rounded-xl w-full font-bold" onChange={e => setForm({...form, serial: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="кВт" value={form.power} className="border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, power: e.target.value})} />
                                    <select className="border-2 p-3 rounded-xl font-bold text-blue-600" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                        <option value="">Оберіть Тег...</option>
                                        {(data.dict.tags || []).map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <select className="w-full border-2 p-3 rounded-xl bg-slate-50 font-black" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setModals({vfd:false, edit:false})} className="flex-1 font-bold text-slate-300 uppercase">Назад</button>
                                    <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest" onClick={save}>Зберегти</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">VFD ANALYTICS LOADING...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <h1 className="text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none">VFD <span className="text-blue-600 italic">Enterprise</span></h1>
                        <div className="flex gap-3">
                             <button onClick={exportToExcel} className="bg-slate-100 px-6 py-3 rounded-2xl font-bold text-slate-500 hover:bg-slate-200 transition-all text-xs tracking-widest border">Excel</button>
                             <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl uppercase tracking-widest text-[11px] hover:scale-105 transition-all">+ Реєстрація</button>
                        </div>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide text-[11px] font-black uppercase tracking-[0.2em]">
                        {['dash', 'table', 'tiles', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 px-2 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Дашборд' : t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'dict' ? 'Довідник' : 'Журнал'}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'dash' && (
                        <div className="space-y-10">
                            {/* Статуси */}
                            <section>
                                <h2 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 ml-4 italic underline decoration-blue-500 decoration-2">Статус обладнання</h2>
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                                    {[
                                        {l: 'Усього', v: stats.status.total, c: 'text-slate-900', b: 'border-slate-200'},
                                        {l: 'В роботі', v: stats.status.work, c: 'text-emerald-500', b: 'border-emerald-200'},
                                        {l: 'Резерв', v: stats.status.reserve, c: 'text-blue-500', b: 'border-blue-200'},
                                        {l: 'Ремонт', v: stats.status.repair, c: 'text-amber-500', b: 'border-amber-200'},
                                        {l: 'Списано', v: stats.status.trash, c: 'text-rose-500', b: 'border-rose-200'}
                                    ].map((s, i) => (
                                        <div key={i} className={`bg-white p-8 rounded-[2rem] shadow-sm border-b-4 ${s.b}`}><p className="text-[9px] font-black text-slate-400 uppercase mb-1">{s.l}</p><p className={`text-4xl font-black ${s.c}`}>{s.v}</p></div>
                                    ))}
                                </div>
                            </section>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                {/* Виробники */}
                                <section>
                                    <h2 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 ml-4 italic underline decoration-slate-900 decoration-2">По брендах</h2>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border min-h-[200px]">
                                        <div className="space-y-4">
                                            {Object.entries(stats.manufacturers).sort((a,b)=>b[1]-a[1]).map(([m, v], i) => (
                                                <div key={i} className="flex items-center justify-between group">
                                                    <span className="font-bold text-slate-700 uppercase text-xs">{m}</span>
                                                    <div className="flex-1 mx-4 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                        <div className="h-full bg-slate-900 transition-all duration-1000" style={{width: `${(v/stats.status.total)*100}%`}}></div>
                                                    </div>
                                                    <span className="font-black text-slate-900">{v}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                {/* Потужність */}
                                <section>
                                    <h2 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 ml-4 italic underline decoration-blue-600 decoration-2">Групи потужності</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white p-6 rounded-[2rem] border-l-4 border-l-emerald-400 shadow-sm text-center">
                                            <p className="text-[9px] font-black text-slate-300 uppercase">До 5.5 кВт</p>
                                            <p className="text-3xl font-black">{stats.power.low}</p>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border-l-4 border-l-blue-500 shadow-sm text-center">
                                            <p className="text-[9px] font-black text-slate-300 uppercase">7.5 - 22 кВт</p>
                                            <p className="text-3xl font-black">{stats.power.mid}</p>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border-l-4 border-l-slate-800 shadow-sm text-center">
                                            <p className="text-[9px] font-black text-slate-300 uppercase">22+ кВт</p>
                                            <p className="text-3xl font-black">{stats.power.high}</p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>
                    )}

                    {(activeTab === 'table' || activeTab === 'tiles') && (
                        <>
                            <div className="flex flex-wrap gap-4 mb-6 bg-slate-200/40 p-3 rounded-2xl border border-slate-200">
                                <select className="p-2 border rounded-xl text-xs font-bold bg-white" value={fMan} onChange={e => setFMan(e.target.value)}>
                                    <option>Всі виробники</option>
                                    {[...new Set(allVfds.map(([id, v]) => v.manufacturer))].filter(Boolean).map(m => <option key={m}>{m}</option>)}
                                </select>
                                <select className="p-2 border rounded-xl text-xs font-bold bg-white" value={fTag} onChange={e => setFTag(e.target.value)}>
                                    <option>Всі локації</option>
                                    {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                                </select>
                                <select className="p-2 border rounded-xl text-xs font-bold bg-white" value={fStat} onChange={e => setFStat(e.target.value)}>
                                    <option>Всі статуси</option>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                                </select>
                            </div>

                            {activeTab === 'table' && (
                                <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b tracking-widest">
                                            <tr><th className="p-6">Дія</th><th className="p-6">Пристрій</th><th className="p-6">кВт</th><th className="p-6">S/N</th><th className="p-6">Локація</th><th className="p-6">Статус</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm italic">
                                            {filteredVfds.map(([id, v]) => (
                                                <tr key={id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-6 flex gap-3">
                                                        <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold">✎</button>
                                                        <button onClick={() => {if(confirm(`Видалити ${v.manufacturer}?`)) db.ref(DB_PATH+'vfds/'+id).remove();}} className="text-red-300 font-bold">🗑</button>
                                                    </td>
                                                    <td className="p-6 font-black uppercase text-slate-800 leading-tight">
                                                        {v.manufacturer} {v.series}
                                                        <div className="text-[10px] text-slate-400 font-mono not-italic uppercase">{v.part}</div>
                                                    </td>
                                                    <td className="p-6 font-bold">{v.power} кВт</td>
                                                    <td className="p-6 text-slate-400 font-mono uppercase">{v.serial}</td>
                                                    <td className="p-6 font-black text-blue-600 underline underline-offset-8 decoration-blue-100 italic tracking-tighter">{v.tag}</td>
                                                    <td className="p-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'tiles' && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredVfds.map(([id, v]) => (
                                        <div key={id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 relative hover:shadow-xl transition-all border-t-8 border-t-slate-800">
                                            <h3 className="text-2xl font-black text-slate-900 tracking-tighter uppercase mb-1">{v.manufacturer}</h3>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-6 italic">{v.series}</p>
                                            <div className="space-y-4 border-t pt-6 font-bold text-sm tracking-tighter">
                                                <div className="flex justify-between border-b pb-2 border-slate-50"><span className="text-[9px] text-slate-300 uppercase italic">S/N:</span><span className="uppercase text-slate-600">{v.serial}</span></div>
                                                <div className="flex justify-between border-b pb-2 border-slate-50"><span className="text-[9px] text-slate-300 uppercase italic">Локація:</span><span className="text-blue-600 underline underline-offset-4 decoration-blue-100 italic">{v.tag}</span></div>
                                                <div className="flex justify-between border-b pb-2 border-slate-50"><span className="text-[9px] text-slate-300 uppercase italic">Потужність:</span><span>{v.power} кВт</span></div>
                                                <div className="pt-4 flex justify-between items-center">
                                                    <span className="px-3 py-1 bg-slate-50 rounded-full text-[10px] font-black uppercase text-slate-400 border">{v.status}</span>
                                                    <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 text-xs font-black uppercase">✎ Редагувати</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </>
                    )}

                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                                <div className="flex justify-between items-center mb-8 border-b pb-4">
                                    <h3 className="font-black text-xs uppercase text-blue-600 italic tracking-widest">Каталог обладнання</h3>
                                    <button onClick={() => setModals({...modals, hware: true})} className="bg-slate-900 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-slate-200">+ ДОДАТИ</button>
                                </div>
                                <div className="space-y-3 max-h-96 overflow-y-auto pr-2 scrollbar-hide">
                                    {(data.dict.hardware || []).map((h, i) => (
                                        <div key={i} className="p-5 bg-slate-50 rounded-3xl border border-slate-100 flex justify-between items-center group transition-all hover:bg-white hover:shadow-md">
                                            <div><p className="font-black text-sm uppercase leading-none mb-1 tracking-tighter text-slate-800">{h.m} {h.s}</p><p className="text-[10px] text-slate-400 font-mono italic">{h.part} | {h.p} кВт</p></div>
                                            <div className="flex gap-4 opacity-0 group-hover:opacity-100 transition-all">
                                                <button onClick={() => {setEditIdx(i); setModals({...modals, hwareEdit: true})}} className="text-blue-500 font-black text-xs uppercase tracking-tighter">✎</button>
                                                <button onClick={() => {if(confirm(`Видалити модель ${h.s}?`)) { const nl=[...(data.dict.hardware||[])]; nl.splice(i,1); db.ref(DB_PATH+'dict/hardware').set(nl); }}} className="text-red-400 font-black text-xs uppercase tracking-tighter">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                <div className="flex justify-between items-center mb-8 border-b pb-4 text-left">
                                    <h3 className="font-black text-xs uppercase text-emerald-600 italic tracking-widest">Теги встановлення</h3>
                                    <button onClick={() => {const t=prompt("Введіть назву Тегу:"); if(t) db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), t])}} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-emerald-50">+ ТЕГ</button>
                                </div>
                                <div className="flex flex-wrap gap-2 justify-center">
                                    {(data.dict.tags || []).map((t, i) => (
                                        <div key={i} className="px-5 py-2.5 bg-emerald-50 text-emerald-700 rounded-2xl text-[10px] font-black uppercase flex items-center gap-3 border border-emerald-100">
                                            {t}
                                            <button onClick={() => {if(confirm(`Видалити тег ${t}?`)) { const nl=[...(data.dict.tags||[])]; nl.splice(i,1); db.ref(DB_PATH+'dict/tags').set(nl); }}} className="text-emerald-300 hover:text-emerald-900 font-black transition-colors">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-10 max-h-[600px] overflow-y-auto scrollbar-hide">
                            <h3 className="text-xs font-black uppercase text-slate-300 mb-8 italic tracking-[0.3em] border-b pb-4 text-center">Cloud Activity Monitor</h3>
                            <div className="space-y-6">
                                {Object.values(data.log || {}).reverse().slice(0, 100).map((l, i) => (
                                    <div key={i} className="flex gap-8 border-l-4 pl-8 py-1 relative border-slate-100 hover:border-blue-500 transition-all">
                                        <div className="absolute -left-[6px] top-3 w-3 h-3 rounded-full bg-white border-2 border-blue-500"></div>
                                        <div className="text-[10px] font-mono text-slate-300 w-36 shrink-0 leading-loose uppercase tracking-tighter">{l.ts}</div>
                                        <div className="text-xs font-bold text-slate-700 tracking-tight leading-relaxed uppercase">{l.msg}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdFormModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    {(modals.hware || modals.hwareEdit) && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 font-bold">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                                <h2 className="font-black mb-6 uppercase italic text-slate-800 tracking-tighter">Каталог моделей</h2>
                                <div className="space-y-4">
                                    <input placeholder="Виробник" className="w-full border-2 p-3 rounded-xl" value={(modals.hwareEdit ? data.dict.hardware[editIdx].m : '')} onChange={e => {}} />
                                    <p className="text-[10px] text-slate-300 italic">Виправте код, щоб поля були доступні для редагування...</p>
                                </div>
                                <div className="flex gap-2 mt-8">
                                    <button onClick={() => setModals({...modals, hware: false, hwareEdit: false})} className="flex-1 text-slate-300 uppercase">Назад</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
