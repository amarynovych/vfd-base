<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise | Power Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('table');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false, hwareEdit: false });
            const [selectedId, setSelectedId] = React.useState(null);
            const [editIdx, setEditIdx] = React.useState(null);
            
            const [fMan, setFMan] = React.useState('Всі');
            const [fTag, setFTag] = React.useState('Всі');
            const [fStat, setFStat] = React.useState('Всі');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg) => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    user: "Адмін",
                    msg: msg
                });
            };

            const deleteRegistryItem = (id, name) => {
                if(confirm(`Видалити ПЧ ${name}?`)) {
                    db.ref(DB_PATH + 'vfds/' + id).remove();
                    logAction(`Реєстр: видалено ПЧ ${name}`);
                }
            };

            const deleteDictItem = (path, index, name) => {
                if(confirm(`Видалити ${name} з довідника?`)) {
                    const newList = [...(data.dict[path] || [])];
                    newList.splice(index, 1);
                    db.ref(DB_PATH + 'dict/' + path).set(newList);
                    logAction(`Довідник: видалено ${name}`);
                }
            };

            const filteredVfds = Object.entries(data.vfds || {}).filter(([id, v]) => {
                return (fMan === 'Всі' || v.manufacturer === fMan) &&
                       (fTag === 'Всі' || v.tag === fTag) &&
                       (fStat === 'Всі' || v.status === fStat);
            });

            // --- МОДАЛКА ПЧ (РЕЄСТР) ---
            const VfdFormModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                
                const hardware = data.dict.hardware || [];
                const mans = [...new Set(hardware.map(h => h.m))];
                const modelsForMan = hardware.filter(h => h.m === form.manufacturer);

                const save = () => {
                    const payload = { ...form, lastUpd: new Date().toLocaleString() };
                    if (mode === 'add') db.ref(DB_PATH + 'vfds').push(payload);
                    else db.ref(DB_PATH + 'vfds/' + targetId).update(payload);
                    setModals({ ...modals, vfd: false, edit: false });
                    logAction(`${mode === 'add' ? 'Додано' : 'Змінено'} ПЧ: ${form.manufacturer} ${form.serial}`);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8 max-h-[90vh] overflow-y-auto">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600">{mode === 'add' ? 'Нова Реєстрація' : 'Редагування'}</h2>
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <select className="border-2 p-3 rounded-xl font-bold bg-white" value={form.manufacturer} onChange={e => setForm({...form, manufacturer: e.target.value})}>
                                        <option value="">Виробник...</option>
                                        {mans.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <select className="border-2 p-3 rounded-xl font-bold bg-white" value={form.series} onChange={e => {
                                        const h = hardware.find(item => item.s === e.target.value && item.m === form.manufacturer);
                                        if (h) setForm({...form, series: h.s, part: h.part, power: h.p});
                                        else setForm({...form, series: e.target.value});
                                    }}>
                                        <option value="">Модель...</option>
                                        {modelsForMan.map((h, i) => <option key={i} value={h.s}>{h.s}</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Заказний код" value={form.part} className="border-2 p-3 rounded-xl w-full font-mono text-sm" onChange={e => setForm({...form, part: e.target.value})} />
                                    <input placeholder="Серійний номер" value={form.serial} className="border-2 border-blue-200 p-3 rounded-xl w-full font-bold" onChange={e => setForm({...form, serial: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Потужність, кВт" value={form.power} className="border-2 p-3 rounded-xl w-full font-bold" onChange={e => setForm({...form, power: e.target.value})} />
                                    <select className="border-2 p-3 rounded-xl font-bold text-blue-600 w-full" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                        <option value="">Локація...</option>
                                        {(data.dict.tags || []).map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <select className="w-full border-2 p-3 rounded-xl bg-slate-50 font-bold" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setModals({vfd:false, edit:false})} className="flex-1 font-bold text-slate-400">Назад</button>
                                    <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg" onClick={save}>ОК</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- МОДАЛКА ДОВІДНИКА (HARDWARE) ---
            const HwareModal = ({ mode = 'add', index = null }) => {
                const [h, setH] = React.useState(mode === 'edit' ? data.dict.hardware[index] : { m: '', s: '', p: '', part: '' });
                const save = () => {
                    if(!h.m || !h.s || !h.p || !h.part) return alert("Заповніть всі поля моделі!");
                    const newList = [...(data.dict.hardware || [])];
                    if (mode === 'add') newList.push(h); else newList[index] = h;
                    db.ref(DB_PATH + 'dict/hardware').set(newList);
                    setModals({...modals, hware: false, hwareEdit: false});
                    logAction(`Довідник: ${mode === 'add' ? 'додано' : 'змінено'} модель ${h.m} ${h.s}`);
                };
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                            <h2 className="font-black mb-6 uppercase italic text-slate-800">{mode === 'add' ? 'Нова модель' : 'Редагувати'}</h2>
                            <div className="space-y-3">
                                <input placeholder="Виробник" value={h.m} className="w-full border-2 p-3 rounded-xl" onChange={e => setH({...h, m: e.target.value})} />
                                <input placeholder="Серія" value={h.s} className="w-full border-2 p-3 rounded-xl" onChange={e => setH({...h, s: e.target.value})} />
                                <input placeholder="кВт" value={h.p} className="w-full border-2 p-3 rounded-xl" onChange={e => setH({...h, p: e.target.value})} />
                                <input placeholder="Заказний код" value={h.part} className="w-full border-2 p-3 rounded-xl" onChange={e => setH({...h, part: e.target.value})} />
                            </div>
                            <div className="flex gap-2 mt-6">
                                <button onClick={() => setModals({...modals, hware: false, hwareEdit: false})} className="flex-1 font-bold text-slate-400">Назад</button>
                                <button className="flex-[2] bg-slate-900 text-white p-3 rounded-xl font-black" onClick={save}>ЗБЕРЕГТИ</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">VFD CORE LOADING...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border">
                        <h1 className="text-2xl font-black text-slate-900 uppercase">VFD <span className="text-blue-600">Enterprise</span></h1>
                        <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-blue-100">+ ДОДАТИ ПЧ</button>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide text-xs font-black uppercase tracking-widest">
                        {['table', 'tiles', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 px-2 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'dict' ? 'Довідник' : 'Журнал'}
                            </button>
                        ))}
                    </nav>

                    {/* Registry Table */}
                    {activeTab === 'table' && (
                        <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b tracking-widest">
                                    <tr><th className="p-6">Дія</th><th className="p-6">Пристрій</th><th className="p-6">кВт</th><th className="p-6">S/N</th><th className="p-6">Тег</th><th className="p-6">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {filteredVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-6 flex gap-3">
                                                <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold">✎</button>
                                                <button onClick={() => deleteRegistryItem(id, v.manufacturer)} className="text-red-300 hover:text-red-600 font-bold">🗑</button>
                                            </td>
                                            <td className="p-6 leading-tight">
                                                <p className="font-black text-slate-800 uppercase mb-1">{v.manufacturer} {v.series}</p>
                                                <p className="text-[10px] text-slate-400 font-mono italic">{v.part}</p>
                                            </td>
                                            <td className="p-6 font-bold text-slate-600">{v.power}</td>
                                            <td className="p-6 font-bold text-slate-400 italic">{v.serial}</td>
                                            <td className="p-6 font-black text-blue-600 italic underline decoration-blue-100">{v.tag}</td>
                                            <td className="p-6 text-xs uppercase font-black"><span className={v.status === 'В експлуатації' ? 'text-emerald-500' : 'text-amber-500'}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {/* Tiles View */}
                    {activeTab === 'tiles' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 text-sm">
                            {filteredVfds.map(([id, v]) => (
                                <div key={id} className="bg-white p-8 rounded-3xl shadow-sm border relative hover:shadow-xl transition-all group overflow-hidden border-t-4 border-t-slate-100 hover:border-t-blue-500">
                                    <h3 className="text-2xl font-black text-slate-900 tracking-tighter uppercase mb-4">{v.manufacturer}</h3>
                                    <div className="space-y-2 font-bold mb-4">
                                        <div className="flex justify-between border-b pb-1"><span className="text-[9px] text-slate-300 uppercase">Модель:</span><span>{v.series}</span></div>
                                        <div className="flex justify-between border-b pb-1"><span className="text-[9px] text-slate-300 uppercase">кВт:</span><span className="text-blue-600">{v.power}</span></div>
                                        <div className="flex justify-between border-b pb-1"><span className="text-[9px] text-slate-300 uppercase">Тег:</span><span className="italic">{v.tag}</span></div>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-black uppercase text-slate-400">{v.status}</span>
                                        <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold text-xs underline">Редагувати</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Dictionary View */}
                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-8 rounded-3xl shadow-sm border">
                                <div className="flex justify-between mb-6">
                                    <h3 className="font-black text-xs uppercase text-blue-600 italic">1. Каталог моделей</h3>
                                    <button onClick={() => setModals({...modals, hware: true})} className="text-blue-600 font-black text-xs underline">+ ДОДАТИ</button>
                                </div>
                                <div className="space-y-3">
                                    {(data.dict.hardware || []).map((h, i) => (
                                        <div key={i} className="p-4 bg-slate-50 rounded-2xl border flex justify-between items-center group">
                                            <div>
                                                <p className="font-black text-sm uppercase leading-none mb-1">{h.m} {h.s}</p>
                                                <p className="text-[10px] text-slate-400 font-mono">{h.part} | {h.p} кВт</p>
                                            </div>
                                            <div className="flex gap-3 opacity-0 group-hover:opacity-100 transition-all">
                                                <button onClick={() => {setEditIdx(i); setModals({...modals, hwareEdit: true})}} className="text-blue-500 font-bold">✎</button>
                                                <button onClick={() => deleteDictItem('hardware', i, `${h.m} ${h.s}`)} className="text-red-400 font-bold">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-8 rounded-3xl shadow-sm border">
                                <div className="flex justify-between mb-6">
                                    <h3 className="font-black text-xs uppercase text-emerald-600 italic">2. Теги локацій</h3>
                                    <button onClick={() => {const t=prompt("Назва тегу?"); if(t) db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), t])}} className="text-emerald-600 font-black text-xs underline">+ ДОДАТИ</button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {(data.dict.tags || []).map((t, i) => (
                                        <div key={i} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-[10px] font-black uppercase flex items-center gap-2">
                                            {t}
                                            <button onClick={() => deleteDictItem('tags', i, t)} className="text-emerald-300 hover:text-emerald-700">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modals */}
                    {(modals.vfd || modals.edit) && <VfdFormModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    {(modals.hware || modals.hwareEdit) && <HwareModal mode={modals.hwareEdit ? 'edit' : 'add'} index={editIdx} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
