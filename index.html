<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VFD Enterprise | Ultimate Service Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [view, setView] = React.useState('hub');
            const [activeTab, setActiveTab] = React.useState('dash');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false });
            const [selectedId, setSelectedId] = React.useState(null);
            const [searchSN, setSearchSN] = React.useState('');
            const [searchTag, setSearchTag] = React.useState('');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => setData(snap.val() || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } }));
            }, []);

            const logAction = (msg, sn = '', tag = '') => {
                db.ref(DB_PATH + 'log').push({ ts: new Date().toLocaleString("uk-UA"), msg, sn, tag });
            };

            const VfdModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                const save = () => {
                    if (mode === 'add') { db.ref(DB_PATH + 'vfds').push(form); logAction('Реєстрація', form.serial, form.tag); }
                    else { db.ref(DB_PATH + 'vfds/' + targetId).update(form); logAction('Зміна статусу', form.serial, form.tag); }
                    setModals({vfd: false, edit: false});
                };
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-xl">
                            <h2 className="text-xl font-black mb-6 uppercase border-b pb-4">Реєстрація / Редагування</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <select className="border p-4 rounded-xl col-span-2" onChange={e => { const h = data.dict.hardware[e.target.value]; if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p})}}>
                                    <option>-- Модель з довідника --</option>
                                    {(data.dict.hardware || []).map((h, i) => <option key={i} value={i}>{h.m} {h.s}</option>)}
                                </select>
                                <input placeholder="Серійний №" value={form.serial} className="border p-4 rounded-xl" onChange={e => setForm({...form, serial: e.target.value})} />
                                <select className="border p-4 rounded-xl" onChange={e => setForm({...form, tag: e.target.value})}>
                                    <option>Тег</option>{(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                                </select>
                                <select className="col-span-2 border p-4 rounded-xl font-black bg-slate-900 text-white" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                            <button onClick={save} className="w-full mt-6 bg-blue-600 text-white p-4 rounded-2xl font-black uppercase">Зберегти</button>
                        </div>
                    </div>
                );
            };

            if (view === 'hub') return (
                <div className="max-w-6xl mx-auto py-24 text-center">
                    <h1 className="text-5xl font-black mb-20 uppercase italic">Automation <span className="text-blue-600">Hub</span></h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10 px-4">
                        <div onClick={() => setView('vfd')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-8 border-blue-600 cursor-pointer hover:-translate-y-2">
                            <div className="text-7xl mb-6">🔌</div>
                            <h2 className="text-2xl font-black uppercase">ПЧ</h2>
                        </div>
                        <div className="bg-slate-100 p-12 rounded-[3.5rem] opacity-50"><div className="text-7xl mb-6">📟</div><h2 className="text-2xl font-black uppercase">ПЛК (Незабаром)</h2></div>
                        <div className="bg-slate-100 p-12 rounded-[3.5rem] opacity-50"><div className="text-7xl mb-6">🌡️</div><h2 className="text-2xl font-black uppercase">ЗВТ (Незабаром)</h2></div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-8">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2.5rem] shadow-sm border">
                        <button onClick={() => setView('hub')} className="font-black text-xl">←</button>
                        <h1 className="font-black uppercase">Реєстр ПЧ</h1>
                        <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase">+ Реєстрація</button>
                    </header>

                    <nav className="flex gap-8 mb-10 border-b-2 text-xs font-black uppercase tracking-widest">
                        {['dash', 'table', 'sn-hist', 'tag-hist', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-5 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Дашборд' : t === 'table' ? 'Таблиця' : t === 'sn-hist' ? 'Історія ПЧ' : t === 'tag-hist' ? 'Локації' : 'Довідник/Журнал'}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-5 gap-6">
                            {[{l:'Усього', v:Object.keys(data.vfds).length}, {l:'В роботі', v:Object.values(data.vfds).filter(v=>v.status==='В експлуатації').length}, {l:'Резерв', v:Object.values(data.vfds).filter(v=>v.status==='Резерв').length}, {l:'Ремонт', v:Object.values(data.vfds).filter(v=>v.status==='В ремонті').length}, {l:'Списано', v:Object.values(data.vfds).filter(v=>v.status==='Списаний').length}].map((s,i) => (
                                <div key={i} className="bg-white p-8 rounded-[2rem] shadow-sm"><p className="text-[9px] uppercase text-slate-400">{s.l}</p><p className="text-4xl font-black">{s.v}</p></div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <table className="w-full bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase">
                                <tr><th className="p-6">Дія</th><th className="p-6">ПЧ / S/N</th><th className="p-6">кВт</th><th className="p-6">Тег</th><th className="p-6">Статус</th></tr>
                            </thead>
                            <tbody>
                                {Object.entries(data.vfds).map(([id, v]) => (
                                    <tr key={id} className="border-t">
                                        <td className="p-6"><button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }}>✎</button></td>
                                        <td className="p-6">{v.manufacturer} {v.series} <br/><span className="text-[10px] text-blue-500 font-mono">{v.serial}</span></td>
                                        <td className="p-6">{v.power}</td><td className="p-6">{v.tag}</td><td className="p-6">{v.status}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                    {(modals.vfd || modals.edit) && <VfdModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
