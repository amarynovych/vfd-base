<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- КОНФІГУРАЦІЯ ---
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_enterprise_data/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, catalog: { manufacturers: ["Siemens", "Danfoss"], positions: ["Склад"], users: [{name: "Адмін", pin: "1111"}] } });
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dash');
            const [currentUser, setCurrentUser] = React.useState(null);
            const [search, setSearch] = React.useState('');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    if (snap.val()) setData(prev => ({...prev, ...snap.val()}));
                    setLoading(false);
                });
            }, []);

            // --- ФУНКЦІЇ ---
            const writeLog = (msg) => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString(),
                    user: currentUser || "Анонім",
                    msg: msg
                });
            };

            const checkAuth = () => {
                if (currentUser) return true;
                const name = prompt("Ваше ім'я?");
                if (!name) return false;
                const userObj = (data.catalog.users || []).find(u => u.name === name);
                if (userObj && userObj.pin) {
                    const pin = prompt("Введіть PIN-код:");
                    if (pin !== userObj.pin) { alert("Невірний код!"); return false; }
                }
                setCurrentUser(name);
                return true;
            };

            const addVfd = () => {
                if (!checkAuth()) return;
                const m = prompt("Виробник?");
                if (!m) return;
                const p = prompt("Потужність (кВт)?");
                const newRef = db.ref(DB_PATH + 'vfds').push();
                newRef.set({ m, p, st: "Резерв", pos: "Склад", lastUpd: new Date().toLocaleString() });
                writeLog(`Додав ПЧ: ${m} ${p}кВт`);
            };

            const updateVfd = (id, field, val) => {
                if (!checkAuth()) return;
                db.ref(`${DB_PATH}vfds/${id}`).update({ [field]: val, lastUpd: new Date().toLocaleString() });
                writeLog(`Змінив ${field} для ПЧ ${id} на ${val}`);
            };

            const exportToExcel = () => {
                const rows = [["ID", "Виробник", "Потужність", "Статус", "Позиція", "Оновлено"]];
                Object.entries(data.vfds || {}).forEach(([id, v]) => {
                    rows.push([id, v.m, v.p, v.st, v.pos, v.lastUpd]);
                });
                const csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `vfd_report_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            if (loading) return <div className="p-20 text-center font-bold animate-pulse">ЗАВАНТАЖЕННЯ СИСТЕМИ...</div>;

            const vfdList = Object.entries(data.vfds || {}).map(([id, v]) => ({id, ...v}));
            const stats = {
                total: vfdList.length,
                work: vfdList.filter(v => v.st === "В експлуатації").length,
                repair: vfdList.filter(v => v.st === "В ремонті").length,
                reserve: vfdList.filter(v => v.st === "Резерв").length
            };

            return (
                <div className="max-w-7xl mx-auto p-4">
                    {/* Header */}
                    <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
                        <h1 className="text-2xl font-black text-slate-800">VFD <span className="text-blue-600">Enterprise</span></h1>
                        <div className="flex gap-4 items-center">
                            <span className="text-sm font-medium text-slate-500 italic">Користувач: {currentUser || "Не залогінено"}</span>
                            <button onClick={exportToExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-emerald-700">Експорт Excel</button>
                            <button onClick={addVfd} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700">+ Додати ПЧ</button>
                        </div>
                    </div>

                    {/* Tabs Navigation */}
                    <div className="flex gap-8 mb-6 bg-white px-6 rounded-xl shadow-sm">
                        <button onClick={() => setActiveTab('dash')} className={`py-4 ${activeTab === 'dash' ? 'tab-active' : ''}`}>Дашборд</button>
                        <button onClick={() => setActiveTab('table')} className={`py-4 ${activeTab === 'table' ? 'tab-active' : ''}`}>Реєстр (Таблиця)</button>
                        <button onClick={() => setActiveTab('catalog')} className={`py-4 ${activeTab === 'catalog' ? 'tab-active' : ''}`}>Довідник</button>
                        <button onClick={() => setActiveTab('log')} className={`py-4 ${activeTab === 'log' ? 'tab-active' : ''}`}>Журнал подій</button>
                    </div>

                    {/* Content */}
                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div className="bg-white p-6 rounded-2xl border-l-4 border-blue-500 shadow-sm">
                                <p className="text-slate-400 text-xs font-bold uppercase">Усього пристроїв</p>
                                <p className="text-3xl font-black">{stats.total}</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border-l-4 border-emerald-500 shadow-sm">
                                <p className="text-slate-400 text-xs font-bold uppercase">В експлуатації</p>
                                <p className="text-3xl font-black text-emerald-600">{stats.work}</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border-l-4 border-amber-500 shadow-sm">
                                <p className="text-slate-400 text-xs font-bold uppercase">Резерв</p>
                                <p className="text-3xl font-black text-amber-500">{stats.reserve}</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border-l-4 border-rose-500 shadow-sm">
                                <p className="text-slate-400 text-xs font-bold uppercase">В ремонті</p>
                                <p className="text-3xl font-black text-rose-600">{stats.repair}</p>
                            </div>
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b">
                                <input placeholder="Шукати за позицією або виробником..." className="w-full p-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none" onChange={e => setSearch(e.target.value)} />
                            </div>
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                                    <tr>
                                        <th className="p-4">Виробник</th>
                                        <th className="p-4">кВт</th>
                                        <th className="p-4">Статус</th>
                                        <th className="p-4">Позиція (Місце)</th>
                                        <th className="p-4">Остання зміна</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {vfdList.filter(v => v.m.includes(search) || v.pos.includes(search)).map(v => (
                                        <tr key={v.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-bold">{v.m}</td>
                                            <td className="p-4">{v.p}</td>
                                            <td className="p-4">
                                                <select className="text-sm p-1 rounded border bg-white" value={v.st} onChange={e => updateVfd(v.id, 'st', e.target.value)}>
                                                    {["В експлуатації", "Резерв", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-4">
                                                <input className="text-sm p-1 border rounded w-full bg-transparent hover:bg-white" value={v.pos} onBlur={e => updateVfd(v.id, 'pos', e.target.value)} onChange={e => {}} />
                                            </td>
                                            <td className="p-4 text-xs text-slate-400">{v.lastUpd}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'catalog' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm">
                                <h3 className="font-bold mb-4">Відповідальні та PIN-коди</h3>
                                {data.catalog.users?.map((u, i) => (
                                    <div key={i} className="flex justify-between p-2 border-b text-sm">
                                        <span>{u.name}</span>
                                        <span className="font-mono text-slate-400">PIN: {u.pin}</span>
                                    </div>
                                ))}
                                <button className="mt-4 text-blue-600 text-sm font-bold" onClick={() => {
                                    const n = prompt("Ім'я?");
                                    const p = prompt("PIN?");
                                    db.ref(DB_PATH + 'catalog/users').set([...(data.catalog.users || []), {name: n, pin: p}]);
                                }}>+ Додати відповідального</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-2xl shadow-sm p-6 max-h-[600px] overflow-y-auto">
                            {Object.values(data.log || {}).reverse().map((l, i) => (
                                <div key={i} className="border-l-2 border-blue-100 pl-4 py-3 mb-2">
                                    <div className="flex justify-between text-[10px] text-slate-400 font-bold uppercase">
                                        <span>{l.ts}</span>
                                        <span className="text-blue-600">{l.user}</span>
                                    </div>
                                    <p className="text-sm text-slate-700">{l.msg}</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
