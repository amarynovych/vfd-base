<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFD Enterprise | Test Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('table');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false });
            const [selectedId, setSelectedId] = React.useState(null);
            
            const [fMan, setFMan] = React.useState('Всі');
            const [fTag, setFTag] = React.useState('Всі');
            const [fStat, setFStat] = React.useState('Всі');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg) => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    user: "Адмін (Тест)",
                    msg: msg
                });
            };

            const deleteVfd = (id, name) => {
                if(confirm(`Видалити ПЧ ${name}?`)) {
                    db.ref(DB_PATH + 'vfds/' + id).remove();
                    logAction(`Видалено ПЧ: ${name}`);
                }
            };

            const exportToExcel = () => {
                const rows = [["Виробник", "Серія", "Заказний номер", "Серійний №", "Потужність", "Тег", "Статус"]];
                Object.values(data.vfds || {}).forEach(v => {
                    rows.push([v.manufacturer || "-", v.series || "-", v.part || "-", v.serial || "-", v.power || "-", v.tag || "-", v.status || "-"]);
                });
                const csv = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `VFD_Export.csv`;
                link.click();
            };

            const filteredVfds = Object.entries(data.vfds || {}).filter(([id, v]) => {
                return (fMan === 'Всі' || v.manufacturer === fMan) &&
                       (fTag === 'Всі' || v.tag === fTag) &&
                       (fStat === 'Всі' || v.status === fStat);
            });

            const VfdModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                
                const mans = [...new Set((data.dict.hardware || []).map(h => h.m))];
                const modelsForMan = (data.dict.hardware || []).filter(h => h.m === form.manufacturer);

                const save = () => {
                    if (mode === 'add') {
                        db.ref(DB_PATH + 'vfds').push({ ...form, lastUpd: new Date().toLocaleString() });
                        logAction(`Додано ПЧ: ${form.manufacturer} ${form.series}`);
                    } else {
                        db.ref(DB_PATH + 'vfds/' + targetId).update({ ...form, lastUpd: new Date().toLocaleString() });
                        logAction(`Змінено ПЧ: ${form.manufacturer} ${form.serial}`);
                    }
                    setModals({ vfd: false, edit: false, hware: false, tag: false });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600">{mode === 'add' ? 'Додати ПЧ' : 'Змінити дані'}</h2>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 text-xs">Виробник</p>
                                    <select className="w-full border-2 p-3 rounded-xl font-bold bg-white" value={form.manufacturer} onChange={e => setForm({...form, manufacturer: e.target.value})}>
                                        <option value="">Оберіть...</option>
                                        {mans.map(m => <option key={m}>{m}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 text-xs">Модель</p>
                                    <select className="w-full border-2 p-3 rounded-xl font-bold bg-white" value={form.series} onChange={e => {
                                        const h = data.dict.hardware.find(item => item.s === e.target.value && item.m === form.manufacturer);
                                        if (h) setForm({...form, series: h.s, part: h.part, power: h.p});
                                        else setForm({...form, series: e.target.value});
                                    }}>
                                        <option value="">Оберіть...</option>
                                        {modelsForMan.map((h, i) => <option key={i} value={h.s}>{h.s}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 text-xs">Заказний номер</p>
                                    <input value={form.part} className="bg-slate-50 border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, part: e.target.value})} />
                                </div>
                                <div>
                                    <p className="text-[10px] font-bold text-blue-600 uppercase ml-2 font-black text-xs italic underline">Серійний номер</p>
                                    <input value={form.serial} className="border-2 border-blue-200 p-3 rounded-xl w-full font-bold focus:border-blue-600 outline-none" onChange={e => setForm({...form, serial: e.target.value})} />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 text-xs">кВт</p>
                                    <input value={form.power} className="bg-slate-50 border-2 p-3 rounded-xl w-full" onChange={e => setForm({...form, power: e.target.value})} />
                                </div>
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 text-xs">Локація (Тег)</p>
                                    <select className="border-2 p-3 rounded-xl font-bold text-blue-600 w-full bg-white" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                        <option value="">Оберіть...</option>
                                        {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                                    </select>
                                </div>
                            </div>
                            <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 text-xs">Статус</p>
                            <select className="w-full border-2 p-3 rounded-xl bg-slate-50 font-bold mb-8 uppercase" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                            </select>
                            <div className="flex gap-4">
                                <button onClick={() => setModals({vfd:false, edit:false})} className="flex-1 font-bold text-slate-400">Скасувати</button>
                                <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black shadow-xl uppercase tracking-widest" onClick={save}>ЗБЕРЕГТИ</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const GenericModal = ({ title, fields, onSave, onClose }) => {
                const [form, setForm] = React.useState({});
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
                            <h2 className="text-xl font-black mb-6 uppercase italic">{title}</h2>
                            {fields.map(f => (
                                <div key={f.name} className="mb-4">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1">{f.label}</p>
                                    <input className="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" onChange={e => setForm({...form, [f.name]: e.target.value})} />
                                </div>
                            ))}
                            <div className="flex gap-2 pt-4">
                                <button onClick={onClose} className="flex-1 font-bold text-slate-400">Назад</button>
                                <button onClick={() => onSave(form)} className="flex-[2] bg-slate-900 text-white p-3 rounded-xl font-black">ОК</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse">VFD SYSTEM CONNECTING...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm">
                        <h1 className="text-2xl font-black text-slate-900 uppercase">VFD <span className="text-blue-600">Enterprise</span></h1>
                        <div className="flex gap-3">
                             <button onClick={exportToExcel} className="bg-slate-100 px-6 py-3 rounded-2xl font-bold text-slate-500 hover:bg-slate-200">Excel</button>
                             <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100">+ ДОДАТИ ПЧ</button>
                        </div>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide">
                        {['table', 'tiles', 'dict', 'log', 'dash'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 px-2 text-xs font-black uppercase tracking-widest ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'dict' ? 'Довідник' : t === 'log' ? 'Журнал' : 'Дашборд'}
                            </button>
                        ))}
                    </nav>

                    {(activeTab === 'table' || activeTab === 'tiles') && (
                        <div className="flex flex-wrap gap-4 mb-6 p-2">
                            <select className="p-2 border rounded-xl text-xs font-bold" onChange={e => setFMan(e.target.value)}>
                                <option>Всі виробники</option>
                                {[...new Set(Object.values(data.vfds || {}).map(v => v.manufacturer))].map(m => <option key={m}>{m}</option>)}
                            </select>
                            <select className="p-2 border rounded-xl text-xs font-bold" onChange={e => setFTag(e.target.value)}>
                                <option>Всі локації</option>
                                {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                            </select>
                            <select className="p-2 border rounded-xl text-xs font-bold" onChange={e => setFStat(e.target.value)}>
                                <option>Всі статуси</option>
                                {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s}>{s}</option>)}
                            </select>
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                                    <tr><th className="p-6">Дія</th><th className="p-6">Пристрій / Код</th><th className="p-6">S/N</th><th className="p-6">кВт</th><th className="p-6">Локація</th><th className="p-6">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 font-medium">
                                    {filteredVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-6 flex gap-2">
                                                <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 text-lg hover:scale-125 transition-transform">✎</button>
                                                <button onClick={() => deleteVfd(id, `${v.manufacturer} ${v.serial}`)} className="text-red-300 hover:text-red-600 text-lg hover:scale-125 transition-transform">🗑</button>
                                            </td>
                                            <td className="p-6 leading-tight">
                                                <div className="font-black text-slate-800 uppercase">{v.manufacturer} {v.series}</div>
                                                <div className="text-[10px] text-slate-400 font-mono italic">{v.part}</div>
                                            </td>
                                            <td className="p-6 font-bold text-slate-500">{v.serial}</td>
                                            <td className="p-6 font-bold">{v.power}</td>
                                            <td className="p-6 font-bold text-blue-600 italic underline decoration-blue-100 underline-offset-4">{v.tag}</td>
                                            <td className="p-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'tiles' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredVfds.map(([id, v]) => (
                                <div key={id} className="bg-white p-8 rounded-3xl shadow-sm border relative hover:shadow-xl transition-all group">
                                    <div className="flex justify-between items-start mb-4">
                                        <h3 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">{v.manufacturer}</h3>
                                        <div className="flex gap-2">
                                            <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-400 hover:text-blue-600 font-bold">✎</button>
                                            <button onClick={() => deleteVfd(id, v.serial)} className="text-red-200 hover:text-red-500 font-bold">✕</button>
                                        </div>
                                    </div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest">{v.series}</p>
                                    <div className="space-y-3 border-t pt-4 font-bold text-sm">
                                        <div className="flex justify-between"><span className="text-slate-300 uppercase text-[9px]">S/N:</span><span>{v.serial}</span></div>
                                        <div className="flex justify-between"><span className="text-slate-300 uppercase text-[9px]">Локація:</span><span className="text-blue-600">{v.tag}</span></div>
                                        <div className="flex justify-between"><span className="text-slate-300 uppercase text-[9px]">Потужність:</span><span>{v.power} кВт</span></div>
                                        <div className="pt-2"><span className="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest">{v.status}</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-8 rounded-3xl shadow-sm border">
                                <h3 className="font-black text-[10px] uppercase text-blue-600 mb-6 underline decoration-4 underline-offset-8">Каталог моделей</h3>
                                <div className="space-y-2 mb-6 max-h-64 overflow-y-auto pr-2">
                                    {(data.dict.hardware || []).map((h, i) => <div key={i} className="p-4 bg-slate-50 rounded-2xl border flex justify-between items-center"><div className="font-black text-sm uppercase">{h.m} {h.s} <span className="block text-[9px] text-slate-400 normal-case font-mono">{h.part}</span></div><div className="font-bold text-slate-400">{h.p} кВт</div></div>)}
                                </div>
                                <button onClick={() => setModals({...modals, hware: true})} className="w-full p-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase">+ ДОДАТИ В КАТАЛОГ</button>
                            </div>
                            <div className="bg-white p-8 rounded-3xl shadow-sm border text-center">
                                <h3 className="font-black text-[10px] uppercase text-emerald-600 mb-6 underline decoration-4 underline-offset-8">Теги локацій</h3>
                                <div className="flex flex-wrap gap-2 mb-6 justify-center">{(data.dict.tags || []).map((t, i) => <span key={i} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-[10px] font-black shadow-sm uppercase">{t}</span>)}</div>
                                <button onClick={() => setModals({...modals, tag: true})} className="w-full p-4 bg-emerald-100 text-emerald-800 rounded-2xl font-black text-[10px] uppercase">+ ДОДАТИ ТЕГ</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-3xl shadow-sm border p-10 max-h-[600px] overflow-y-auto">
                            <div className="space-y-4">
                                {Object.values(data.log || {}).reverse().map((l, i) => (
                                    <div key={i} className="flex gap-6 border-l-2 pl-6 py-2 relative border-slate-100 hover:bg-slate-50 transition-colors">
                                        <div className="absolute -left-[5px] top-4 w-2 h-2 rounded-full bg-blue-500"></div>
                                        <div className="text-[10px] font-mono text-slate-400 w-36 shrink-0">{l.ts}</div>
                                        <div className="text-xs font-medium text-slate-700">{l.msg}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'dash' && (
                         <div className="grid grid-cols-1 md:grid-cols-4 gap-6 text-center">
                            {[
                                {l: 'Усього', v: Object.keys(data.vfds || {}).length, c: 'text-slate-900'},
                                {l: 'В роботі', v: Object.values(data.vfds || {}).filter(v=>v.status==='В експлуатації').length, c: 'text-emerald-500'},
                                {l: 'Резерв', v: Object.values(data.vfds || {}).filter(v=>v.status==='Резерв').length, c: 'text-blue-500'},
                                {l: 'Ремонт', v: Object.values(data.vfds || {}).filter(v=>v.status==='В ремонті').length, c: 'text-rose-500'}
                            ].map((s, i) => (
                                <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 transition-transform hover:scale-105">
                                    <p className="text-[10px] font-black text-slate-300 uppercase mb-1 tracking-widest">{s.l}</p>
                                    <p className={`text-5xl font-black ${s.c}`}>{s.v}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    
                    {modals.hware && <GenericModal title="Нова модель" fields={[{name:'m', label:'Виробник'}, {name:'s', label:'Серія'}, {name:'p', label:'кВт'}, {name:'part', label:'Заказний номер'}]} 
                        onClose={() => setModals({...modals, hware:false})} onSave={(f) => { db.ref(DB_PATH+'dict/hardware').set([...(data.dict.hardware||[]), f]); setModals({...modals, hware:false}); logAction(`Додано модель: ${f.m} ${f.s}`); }} />}
                    
                    {modals.tag && <GenericModal title="Новий Тег" fields={[{name:'t', label:'Локація'}]} 
                        onClose={() => setModals({...modals, tag:false})} onSave={(f) => { db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), f.t]); setModals({...modals, tag:false}); logAction(`Додано тег: ${f.t}`); }} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
