<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База ПЧ | LIVE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div style="padding: 50px; text-align: center; color: #666; font-family: sans-serif;">
            Завантаження інтерфейсу... (якщо це повідомлення не зникає, натисніть F12)
        </div>
    </div>

    <script type="text/babel">
        // Конфігурація
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        // Ініціалізація (Compat mode для стабільності в HTML)
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function App() {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [err, setErr] = React.useState(null);

            React.useEffect(() => {
                try {
                    const dbRef = database.ref('shared_vfd_list/');
                    dbRef.on('value', (snapshot) => {
                        const val = snapshot.val();
                        if (val) {
                            const list = Object.keys(val).map(id => ({ id, ...val[id] }));
                            setData(list);
                        }
                        setLoading(false);
                    }, (error) => {
                        setErr(error.message);
                        setLoading(false);
                    });
                } catch (e) {
                    setErr(e.message);
                }
            }, []);

            const handleAdd = () => {
                const m = prompt("Виробник:");
                if (!m) return;
                const p = prompt("Потужність (кВт):");
                
                database.ref('shared_vfd_list/').push({
                    manufacturer: m,
                    power: p || "0",
                    status: "В роботі",
                    ts: new Date().toLocaleString()
                });
            };

            if (err) return <div style={{color:'red', padding:20}}>Помилка: {err}</div>;
            if (loading) return <div className="p-10 text-center text-slate-400">Синхронізація з хмарою...</div>;

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-slate-800">🔌 Спільна база ПЧ</h1>
                        <button 
                            onClick={handleAdd}
                            className="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700"
                        >
                            + Додати запис
                        </button>
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-slate-100">
                                <tr>
                                    <th className="p-3 text-left">Виробник</th>
                                    <th className="p-3 text-left">Потужність</th>
                                    <th className="p-3 text-left">Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.length === 0 ? (
                                    <tr><td colSpan="3" className="p-10 text-center text-slate-400">Немає даних. Натисніть "+ Додати запис"</td></tr>
                                ) : (
                                    data.map(item => (
                                        <tr key={item.id} className="border-t">
                                            <td className="p-3 font-semibold">{item.manufacturer}</td>
                                            <td className="p-3">{item.power} кВт</td>
                                            <td className="p-3 text-sm text-slate-400">{item.ts}</td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
