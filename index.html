<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Automation Hub | Service Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAtl9abE3Sgap2G7tzwVK1BQf5ptOxOBFs",
            authDomain: "vfd-db.firebaseapp.com",
            databaseURL: "https://vfd-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vfd-db",
            storageBucket: "vfd-db.firebasestorage.app",
            messagingSenderId: "534290200378",
            appId: "1:534290200378:web:da96cf98c82fbea10dc203"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'vfd_production_final/';

        function App() {
            const [data, setData] = React.useState({ vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('hub');
            const [activeTab, setActiveTab] = React.useState('dash');
            const [modals, setModals] = React.useState({ vfd: false, edit: false, hware: false, tag: false });
            const [selectedId, setSelectedId] = React.useState(null);
            
            const [searchSN, setSearchSN] = React.useState('');
            const [searchTag, setSearchTag] = React.useState('');

            React.useEffect(() => {
                db.ref(DB_PATH).on('value', snap => {
                    const val = snap.val();
                    setData(val || { vfds: {}, log: {}, dict: { hardware: [], tags: [] } });
                    setLoading(false);
                });
            }, []);

            const logAction = (msg, sn = '', tag = '') => {
                db.ref(DB_PATH + 'log').push({
                    ts: new Date().toLocaleString("uk-UA"),
                    msg, sn, tag
                });
            };

            const deleteItem = (id, name) => {
                if(confirm(`Видалити ПЧ ${name}?`)) {
                    db.ref(DB_PATH + 'vfds/' + id).remove();
                    logAction(`Видалено пристрій: ${name}`, name);
                }
            };

            const allVfds = Object.entries(data.vfds || {});
            const allLogs = Object.values(data.log || {}).reverse();

            // --- КОМПОНЕНТИ ВІКОН ---
            const VfdModal = ({ mode = 'add', targetId = null }) => {
                const [form, setForm] = React.useState(mode === 'edit' ? data.vfds[targetId] : { manufacturer: '', series: '', part: '', power: '', tag: '', status: 'Резерв', serial: '' });
                const hardware = data.dict.hardware || [];
                
                const save = () => {
                    if (mode === 'add') {
                        db.ref(DB_PATH + 'vfds').push(form);
                        logAction(`Нова реєстрація`, form.serial, form.tag);
                    } else {
                        db.ref(DB_PATH + 'vfds/' + targetId).update(form);
                        logAction(`Оновлення статусу на ${form.status}`, form.serial, form.tag);
                    }
                    setModals({ ...modals, vfd: false, edit: false });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8">
                            <h2 className="text-2xl font-black mb-6 uppercase italic text-blue-600 tracking-tighter">{mode === 'add' ? 'Реєстрація ПЧ' : 'Редагування'}</h2>
                            <div className="space-y-4">
                                {mode === 'add' && (
                                    <select className="w-full border-2 p-3 rounded-xl bg-blue-50 font-bold" onChange={e => {
                                        const h = hardware[e.target.value];
                                        if(h) setForm({...form, manufacturer: h.m, series: h.s, part: h.part, power: h.p});
                                    }}>
                                        <option value="">-- Виберіть модель з довідника --</option>
                                        {hardware.map((h, i) => <option key={i} value={i}>{h.m} {h.s}</option>)}
                                    </select>
                                )}
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Серійний номер" value={form.serial} className="border-2 border-blue-200 p-3 rounded-xl w-full font-black" onChange={e => setForm({...form, serial: e.target.value})} />
                                    <select className="border-2 p-3 rounded-xl font-bold text-blue-600" value={form.tag} onChange={e => setForm({...form, tag: e.target.value})}>
                                        <option value="">Локація (Тег)</option>
                                        {(data.dict.tags || []).map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <select className="w-full border-2 p-3 rounded-xl bg-slate-900 text-white font-black uppercase" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                    {["Резерв", "В експлуатації", "В ремонті", "Списаний"].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setModals({vfd:false, edit:false})} className="flex-1 font-bold text-slate-300">Скасувати</button>
                                    <button className="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg" onClick={save}>Підтвердити</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const GenericModal = ({ title, fields, onSave, onClose }) => {
                const [f, setF] = React.useState({});
                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 font-bold">
                        <div className="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                            <h2 className="font-black mb-6 uppercase italic text-slate-800 tracking-tighter">{title}</h2>
                            {fields.map(field => (
                                <input key={field.id} placeholder={field.label} className="w-full border-2 p-3 rounded-xl mb-3" onChange={e => setF({...f, [field.id]: e.target.value})} />
                            ))}
                            <div className="flex gap-2 mt-6">
                                <button onClick={onClose} className="flex-1 text-slate-300 uppercase text-xs">Назад</button>
                                <button onClick={() => onSave(f)} className="flex-[2] bg-slate-900 text-white p-3 rounded-xl uppercase text-xs shadow-lg">Зберегти</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black animate-pulse uppercase">Завантаження систем...</div>;

            if (view === 'hub') return (
                <div className="max-w-6xl mx-auto py-20 px-4 text-center">
                    <h1 className="text-5xl font-black text-slate-900 mb-16 tracking-tighter uppercase italic">Automation <span className="text-blue-600">Hub</span></h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                        <div onClick={() => setView('vfd')} className="bg-white p-12 rounded-[3.5rem] shadow-xl border-b-8 border-blue-600 cursor-pointer hover:-translate-y-2 transition-all group">
                            <div className="text-7xl mb-6">🔌</div>
                            <h2 className="text-2xl font-black uppercase">ПЧ</h2>
                            <p className="text-slate-400 mt-2">База та історія обслуговування</p>
                        </div>
                        <div className="bg-white/50 p-12 rounded-[3.5rem] border-b-8 border-slate-200 grayscale opacity-50 cursor-not-allowed">
                            <div className="text-7xl mb-6">📟</div>
                            <h2 className="text-2xl font-black uppercase text-slate-400">Контролери</h2>
                        </div>
                        <div className="bg-white/50 p-12 rounded-[3.5rem] border-b-8 border-slate-200 grayscale opacity-50 cursor-not-allowed">
                            <div className="text-7xl mb-6">🌡️</div>
                            <h2 className="text-2xl font-black uppercase text-slate-400">ЗВТ</h2>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2.5rem] shadow-sm border">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('hub')} className="bg-slate-100 w-10 h-10 rounded-xl hover:bg-slate-200 transition-colors font-black">←</button>
                            <h1 className="text-xl font-black text-slate-900 uppercase">Реєстр <span className="text-blue-600">ПЧ</span></h1>
                        </div>
                        <button onClick={() => setModals({...modals, vfd: true})} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl uppercase text-[11px] tracking-widest">+ Реєстрація</button>
                    </header>

                    <nav className="flex gap-6 mb-8 border-b-2 overflow-x-auto whitespace-nowrap scrollbar-hide text-[10px] font-black uppercase tracking-[0.2em]">
                        {['dash', 'table', 'tiles', 'sn-hist', 'tag-hist', 'dict', 'log'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-4 px-2 ${activeTab === t ? 'tab-active' : 'text-slate-400'}`}>
                                {t === 'dash' ? 'Дашборд' : t === 'table' ? 'Таблиця' : t === 'tiles' ? 'Плитки' : t === 'sn-hist' ? 'Історія ПЧ' : t === 'tag-hist' ? 'Історія Тегу' : t === 'dict' ? 'Довідник' : 'Журнал подій'}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'dash' && (
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-6">
                            {[
                                {l: 'Усього', v: allVfds.length, c: 'text-slate-900'},
                                {l: 'В роботі', v: allVfds.filter(([id,v])=>v.status==='В експлуатації').length, c: 'text-emerald-500'},
                                {l: 'Резерв', v: allVfds.filter(([id,v])=>v.status==='Резерв').length, c: 'text-blue-500'},
                                {l: 'Ремонт', v: allVfds.filter(([id,v])=>v.status==='В ремонті').length, c: 'text-amber-500'},
                                {l: 'Списано', v: allVfds.filter(([id,v])=>v.status==='Списаний').length, c: 'text-rose-500'}
                            ].map((s, i) => (
                                <div key={i} className="bg-white p-8 rounded-[2rem] shadow-sm border-b-4 border-slate-100"><p className="text-[9px] font-black text-slate-300 uppercase mb-1">{s.l}</p><p className={`text-4xl font-black ${s.c}`}>{s.v}</p></div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'sn-hist' && (
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border">
                            <input placeholder="Введіть Серійний № для пошуку історії..." className="w-full p-4 border-2 rounded-2xl mb-8 font-black text-blue-600 outline-none" onChange={e => setSearchSN(e.target.value)} />
                            <div className="space-y-4">
                                {allLogs.filter(l => l.sn === searchSN && searchSN).map((l, i) => (
                                    <div key={i} className="flex gap-6 border-l-4 pl-6 py-2 border-blue-500 bg-slate-50 rounded-r-xl uppercase text-[11px] font-bold">
                                        <span className="text-slate-300 font-mono w-40">{l.ts}</span>
                                        <span className="text-slate-700">{l.msg}</span>
                                        <span className="ml-auto text-blue-400 italic">Тег: {l.tag}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'tag-hist' && (
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border">
                            <select className="w-full p-4 border-2 rounded-2xl mb-8 font-black text-emerald-600 outline-none bg-white" onChange={e => setSearchTag(e.target.value)}>
                                <option value="">-- Оберіть Тег для перегляду історії локації --</option>
                                {(data.dict.tags || []).map(t => <option key={t}>{t}</option>)}
                            </select>
                            <div className="space-y-4">
                                {allLogs.filter(l => l.tag === searchTag && searchTag).map((l, i) => (
                                    <div key={i} className="flex gap-6 border-l-4 pl-6 py-2 border-emerald-500 bg-slate-50 rounded-r-xl uppercase text-[11px] font-bold">
                                        <span className="text-slate-300 font-mono w-40">{l.ts}</span>
                                        <span className="text-slate-700">{l.msg}</span>
                                        <span className="ml-auto text-emerald-500 italic">S/N: {l.sn}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'table' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b tracking-widest">
                                    <tr><th className="p-6">Дія</th><th className="p-6">Пристрій / S/N</th><th className="p-6">Тег</th><th className="p-6">Статус</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {allVfds.map(([id, v]) => (
                                        <tr key={id} className="hover:bg-slate-50 transition-colors group">
                                            <td className="p-6 flex gap-4">
                                                <button onClick={() => { setSelectedId(id); setModals({...modals, edit: true}); }} className="text-blue-500 font-bold">✎</button>
                                                <button onClick={() => deleteItem(id, v.serial)} className="text-red-300 group-hover:text-red-500 transition-all font-bold text-xl">🗑</button>
                                            </td>
                                            <td className="p-6"><div className="font-black text-slate-800 uppercase tracking-tighter">{v.manufacturer} {v.series}</div><div className="text-[10px] text-blue-500 font-bold font-mono uppercase italic">{v.serial}</div></td>
                                            <td className="p-6 font-black text-slate-600 italic tracking-tighter">{v.tag}</td>
                                            <td className="p-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${v.status === 'В експлуатації' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>{v.status}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {activeTab === 'dict' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border">
                                <h3 className="font-black text-xs uppercase text-blue-600 mb-6 italic underline underline-offset-8 decoration-4">1. Каталог обладнання</h3>
                                <button onClick={() => setModals({...modals, hware: true})} className="w-full p-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase mb-6">+ ДОДАТИ МОДЕЛЬ</button>
                                <div className="space-y-2">{(data.dict.hardware || []).map((h, i) => <div key={i} className="p-4 bg-slate-50 rounded-xl font-bold uppercase text-xs">{h.m} {h.s}</div>)}</div>
                            </div>
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border">
                                <h3 className="font-black text-xs uppercase text-emerald-600 mb-6 italic underline underline-offset-8 decoration-4">2. Теги локацій</h3>
                                <button onClick={() => setModals({...modals, tag: true})} className="w-full p-4 bg-emerald-100 text-emerald-800 rounded-2xl font-black text-[10px] uppercase mb-6">+ ДОДАТИ ТЕГ</button>
                                <div className="flex flex-wrap gap-2">{(data.dict.tags || []).map((t, i) => <span key={i} className="px-4 py-2 bg-slate-50 rounded-lg text-[10px] font-black uppercase border">{t}</span>)}</div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'log' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border p-10 max-h-[600px] overflow-y-auto scrollbar-hide text-[11px] font-bold">
                            <h3 className="text-[10px] font-black uppercase text-slate-300 mb-8 italic tracking-[0.3em] border-b pb-4 text-center">Загальний журнал подій</h3>
                            <div className="space-y-4">
                                {allLogs.slice(0, 100).map((l, i) => (
                                    <div key={i} className="flex gap-6 border-l-2 pl-6 py-2 border-slate-100 uppercase">
                                        <span className="text-slate-300 font-mono w-40">{l.ts}</span>
                                        <span className="text-slate-800">{l.msg} (S/N: {l.sn} | Тег: {l.tag})</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {(modals.vfd || modals.edit) && <VfdModal mode={modals.edit ? 'edit' : 'add'} targetId={selectedId} />}
                    {modals.hware && <GenericModal title="Додати модель" fields={[{id:'m', label:'Виробник'}, {id:'s', label:'Серія'}]} onClose={() => setModals({...modals, hware:false})} onSave={(f) => { db.ref(DB_PATH+'dict/hardware').set([...(data.dict.hardware||[]), f]); setModals({...modals, hware:false}); }} />}
                    {modals.tag && <GenericModal title="Додати Тег" fields={[{id:'t', label:'Назва локації'}]} onClose={() => setModals({...modals, tag:false})} onSave={(f) => { db.ref(DB_PATH+'dict/tags').set([...(data.dict.tags||[]), f.t]); setModals({...modals, tag:false}); }} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
